                <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                  <div style={{width:44,height:44,borderRadius:12,background:t.color,color:t.tc,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,flexShrink:0}}>{(app.name||"?").split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase()}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}><span style={{fontWeight:700,fontSize:14}}>{app.name}</span><span style={{background:app.status==="pending"?T.warnBg:app.status==="approved"?T.successBg:T.dangerBg,color:app.status==="pending"?T.warn:app.status==="approved"?T.success:T.danger,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20}}>{app.status}</span></div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}><span style={{background:t.color,color:t.tc,fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20}}>{t.label}</span><span style={{background:T.surface,color:T.muted,fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20}}>Rating {app.rating?.toFixed(1)}</span>{app.screenshotBase64&&<span style={{background:T.surface,color:T.muted,fontSize:11,padding:"2px 8px",borderRadius:20}}>📸</span>}{app.playtomicUrl&&<span style={{background:"#eff6ff",color:T.info,fontSize:11,padding:"2px 8px",borderRadius:20}}>🔗</span>}</div>
                    {app.submittedAt&&<div style={{fontSize:11,color:T.muted,marginTop:4}}>{timeAgoStr(app.submittedAt)}</div>}
                  </div>
                </div>
              </button>
            );})}
          </div>
        )}
      </div>
    </div>
  );
};


// ─── Root App ─────────────────────────────────────────────────────────────────
function PadelRankApp() {
  const[screen,setScreen]=useState("onboard");
  const[user,setUser]=useState(null);
  const[activeTab,setActiveTab]=useState("chats");
  const[matches,setMatches]=useState(SEED_MATCHES);
  const[squads,setSquads]=useState(SEED_SQUADS);
  const[selectedMatch,setSelectedMatch]=useState(null);
  const[selectedSquad,setSelectedSquad]=useState(null);
  const[newMatch,setNewMatch]=useState(null);
  const[activeChatTier,setActiveChatTier]=useState(null);
  const[activeChatLoc,setActiveChatLoc]=useState(null);
  const[chats,setChats]=useState(buildSeedChats());
  const[adminAuthed,setAdminAuthed]=useState(false);
  const[prefilledVenue,setPrefilledVenue]=useState(null);

  useEffect(()=>{
    const link=document.createElement("link");
    link.rel="stylesheet";link.href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap";
    document.head.appendChild(link);
  },[]);

  const handleVerified=(name,rating,verifyMethod="screenshot",locationId=null)=>{
    const loc=locationId||LOCATIONS[1].id;
    setUser({name,rating,initials:name.split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase(),verifyMethod,locationId:loc});
    if(locationId){
      // Already have a location (demo or re-verify with known location) — go straight to main
      setScreen("main");setActiveTab("chats");
    } else {
      setScreen("locationPick");
    }
  };

  const handleLocationSelected=(locationId)=>{
    setUser(u=>({...u,locationId}));
    setScreen("main");setActiveTab("chats");
  };

  // Notification count for matches tab
  const pendingForUser = user ? matches.filter(m=>m.createdBy===user.name&&(m.joinRequests||[]).some(r=>r.status==="pending")).length : 0;

  const handleJoin=(match)=>{setSelectedMatch(match);setScreen("joinConfirm");};

  const confirmJoin=()=>{
    const req={name:user.name,rating:user.rating,status:"pending",requestedAt:Date.now()};
    setMatches(p=>p.map(m=>m.id===selectedMatch.id?{...m,joinRequests:[...(m.joinRequests||[]),req]}:m));
    setSelectedMatch(p=>({...p,joinRequests:[...(p.joinRequests||[]),req]}));
    setScreen("matchDetail");
  };

  const handleApproveRequest=(match,req,approved)=>{
    const updater=m=>{
      if(m.id!==match.id)return m;
      const ur=(m.joinRequests||[]).map(r=>r.name===req.name?{...r,status:approved?"approved":"declined"}:r);
      const up=approved?[...m.players,req.name]:m.players;
      const urat=approved?{...m.playerRatings,[req.name]:req.rating}:m.playerRatings;
      return{...m,joinRequests:ur,players:up,playerRatings:urat};
    };
    setMatches(p=>p.map(updater));setSelectedMatch(p=>updater(p));
  };

  const handleLeave=(match)=>{
    const upd=m=>m.id!==match.id?m:{...m,players:m.players.filter(p=>p!==user.name),joinRequests:(m.joinRequests||[]).filter(r=>r.name!==user.name)};
    setMatches(p=>p.map(upd));setSelectedMatch(p=>upd(p));
  };

  const handleDelete=(match)=>{setMatches(p=>p.filter(m=>m.id!==match.id));setScreen("main");setActiveTab("matches");};

  const handleCreate=(match)=>{
    setMatches(p=>[match,...p]);setNewMatch(match);
    const now=new Date();
    const msg={id:Date.now(),type:"match_card",sender:match.createdBy,match,mine:false,time:`${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`};
    const tierIds=getMatchTierIds(match);
    setChats(p=>{const up={...p};tierIds.forEach(tid=>{const k=chatKey(tid,match.locationId);up[k]=[...(p[k]||[]),{...msg,id:Date.now()+Math.random()}];});return up;});
    setScreen("matchPosted");
  };

  const handleSendChat=(key,msg)=>{setChats(p=>({...p,[key]:[...(p[key]||[]),msg]}));};

  const openChat=(tier,location)=>{setActiveChatTier(tier);setActiveChatLoc(location);setScreen("chatRoom");};
  const openMatchFromChat=(match)=>{setSelectedMatch(match);setScreen("matchDetail");};

  const handleJoinSquad=(squad)=>{setSquads(p=>p.map(s=>s.id===squad.id?{...s,members:[...s.members,user.name]}:s));setSelectedSquad(s=>s?.id===squad.id?{...s,members:[...s.members,user.name]}:s);};
  const handleLeaveSquad=(squad)=>{setSquads(p=>p.map(s=>s.id===squad.id?{...s,members:s.members.filter(m=>m!==user.name)}:s));setSelectedSquad(null);setScreen("main");setActiveTab("squads");};
  const handleCreateSquad=(sq)=>{setSquads(p=>[sq,...p]);setScreen("main");setActiveTab("squads");};

  return(
    <div style={{fontFamily:"'DM Sans',sans-serif",maxWidth:420,margin:"0 auto",background:T.card,borderRadius:24,overflow:"hidden",border:`0.5px solid ${T.border}`,minHeight:"100dvh"}}>

      {screen==="onboard"&&<OnboardingScreen onStart={()=>setScreen("verify")} onSkip={()=>{
        setUser({name:"Demo Player",rating:5.8,initials:"DP",verifyMethod:"demo",locationId:"ftlauderdale"});
        setScreen("main");
        setActiveTab("chats");
      }}/>}

      {screen==="verify"&&<VerifyScreen onVerified={handleVerified} onAdminLogin={()=>setScreen("adminLogin")}/>}

      {screen==="locationPick"&&<LocationPickerScreen onSelect={handleLocationSelected}/>}

      {screen==="adminLogin"&&<AdminLoginScreen onBack={()=>setScreen("verify")} onLogin={()=>{setAdminAuthed(true);setScreen("adminDashboard");}}/>}
      {screen==="adminDashboard"&&adminAuthed&&<AdminDashboardScreen onBack={()=>setScreen("verify")} onApprove={app=>console.log("Approved:",app.name)}/>}

      {screen==="main"&&user&&(
        <div style={{display:"flex",flexDirection:"column",height:"100dvh"}}>
          <div style={{flex:1,overflow:"auto"}}>
            {activeTab==="chats"&&<ChatsTab user={user} chats={chats} onOpenChat={openChat}/>}
            {activeTab==="matches"&&<MatchesTab user={user} matches={matches} onViewMatch={m=>{setSelectedMatch(m);setScreen("matchDetail");}} onCreateMatch={()=>{setPrefilledVenue(null);setScreen("createMatch");}} onJoin={handleJoin}/>}
            {activeTab==="courts"&&<CourtsTab user={user} onCreateMatchAtCourt={court=>{setPrefilledVenue(court);setScreen("createMatch");}}/>}
            {activeTab==="squads"&&<SquadsTab user={user} squads={squads} onOpenSquad={sq=>{setSelectedSquad(sq);setScreen("squadDetail");}} onCreateSquad={()=>setScreen("createSquad")}/>}
            {activeTab==="profile"&&<ProfileTab user={user} matches={matches} squads={squads} onReVerify={()=>setScreen("verify")} onChangeLocation={()=>setScreen("locationPick")}/>}
          </div>
          <NavBar active={activeTab} onSwitch={setActiveTab} notifCount={pendingForUser}/>
        </div>
      )}

      {screen==="chatRoom"&&activeChatTier&&activeChatLoc&&user&&<ChatRoomScreen user={user} tier={activeChatTier} location={activeChatLoc} msgs={chats[chatKey(activeChatTier.id,activeChatLoc.id)]||[]} onSend={handleSendChat} onBack={()=>setScreen("main")} onViewMatch={openMatchFromChat} liveMatches={matches}/>}

      {screen==="matchDetail"&&selectedMatch&&user&&<MatchDetailScreen match={matches.find(m=>m.id===selectedMatch.id)||selectedMatch} user={user} onBack={()=>{setScreen("main");setActiveTab("matches");}} onJoin={handleJoin} onLeave={handleLeave} onDelete={handleDelete} onApproveRequest={handleApproveRequest}/>}

      {screen==="createMatch"&&user&&<CreateMatchScreen user={user} onBack={()=>{setScreen("main");setActiveTab("matches");}} onCreate={handleCreate} prefilledVenue={prefilledVenue}/>}

      {screen==="matchPosted"&&newMatch&&<MatchPostedScreen match={newMatch} onDone={()=>{setSelectedMatch(newMatch);setScreen("matchDetail");}} onGoToChat={()=>{const firstTierId=getMatchTierIds(newMatch)[0];const tier=TIERS.find(t=>t.id===firstTierId);const loc=LOCATIONS.find(l=>l.id===newMatch.locationId)||LOCATIONS[1];if(tier&&loc){setActiveChatTier(tier);setActiveChatLoc(loc);setScreen("chatRoom");}}}/>}

      {screen==="joinConfirm"&&selectedMatch&&user&&<JoinConfirmScreen match={selectedMatch} onConfirm={confirmJoin} onBack={()=>setScreen("matchDetail")}/>}

      {screen==="squadDetail"&&selectedSquad&&user&&<SquadDetailScreen squad={squads.find(s=>s.id===selectedSquad.id)||selectedSquad} user={user} chats={chats} onSend={handleSendChat} onBack={()=>{setScreen("main");setActiveTab("squads");}} onJoin={handleJoinSquad} onLeave={handleLeaveSquad}/>}

      {screen==="createSquad"&&user&&<CreateSquadScreen user={user} onBack={()=>{setScreen("main");setActiveTab("squads");}} onCreate={handleCreateSquad}/>}

    </div>
  );
}

    // ─── Mount ────────────────────────────────────────────────────────────────
    const container = document.getElementById('app-wrapper');
    const appRoot = ReactDOM.createRoot(container);
    appRoot.render(React.createElement(PadelRankApp));

    // Hide loading once React has painted
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        setTimeout(() => {
          const loader = document.getElementById('loading');
          if (loader) {
            loader.classList.add('out');
            setTimeout(() => loader.remove(), 450);
          }
        }, 300);
      });
    });

    // iOS "Add to Home Screen" nudge — only in Safari browser, not standalone
    (function() {
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const isStandalone = window.navigator.standalone === true;
      const dismissed = sessionStorage.getItem('pr_install_dismissed');
      if (isIOS && !isStandalone && !dismissed) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.id = 'ios-install';
          el.innerHTML = `
            <div style="display:flex;align-items:flex-start;gap:12px">
              <div style="font-size:28px;line-height:1">🎾</div>
              <div style="flex:1">
                <div style="font-weight:700;color:#c8f135;font-size:14px;margin-bottom:3px">Install PadelRank</div>
                <div style="color:rgba(255,255,255,0.75);font-size:12px;line-height:1.5">
                  Tap the <strong style="color:white">Share</strong> button
                  <svg style="display:inline;margin:0 2px;vertical-align:middle" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                  then <strong style="color:white">"Add to Home Screen"</strong>
                </div>
              </div>
              <button onclick="this.closest('#ios-install').remove();sessionStorage.setItem('pr_install_dismissed','1')" style="background:none;border:none;color:rgba(255,255,255,0.4);font-size:22px;min-height:auto;padding:0;line-height:1">×</button>
            </div>`;
          document.body.appendChild(el);
        }, 4000);
      }
    })();

  </script>
</body>
</html>
