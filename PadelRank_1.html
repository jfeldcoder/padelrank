<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0f2318"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="PadelRank"/>
  <meta name="description" content="Verified padel match finding — join your level, play your game"/>
  <meta property="og:title" content="PadelRank — Play Your Level"/>
  <meta property="og:description" content="Join verified padel players at your exact level. Local chats, match finding, and squad play across South Florida."/>
  <meta property="og:type" content="website"/>
  <title>PadelRank</title>

  <!-- Apple touch icon (emoji-based) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230f2318'/><text y='.9em' font-size='75' x='12'>🎾</text></svg>"/>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }

    html {
      height: 100%;
      /* Prevent font size inflation on iOS rotation */
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      height: 100%;
      background: #0f2318;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      /* Prevent rubber-band scroll on iOS body */
      overscroll-behavior-y: none;
      overflow: hidden;
    }

    #root {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      background: #0f2318;
    }

    #app-wrapper {
      position: relative;
      width: 100%;
      max-width: 480px;
      height: 100%;
      background: #f5f6f2;
      display: flex;
      flex-direction: column;
      /* Scroll happens inside the app, not on body */
      overflow: hidden;
    }

    /* The React app fills app-wrapper */
    #app-wrapper > div {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Every scrollable inner area */
    .scroll-area {
      -webkit-overflow-scrolling: touch;
      overflow-y: auto;
    }

    /* Nav bar sits above iOS home indicator */
    .nav-safe {
      padding-bottom: max(var(--sab), 8px);
    }

    /* Status bar tint - fills the notch area with app color */
    .header-safe {
      padding-top: var(--sat);
    }

    /* Loading screen */
    #loading {
      position: fixed; inset: 0;
      background: #0f2318;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #loading.out { opacity: 0; pointer-events: none; }
    #loading-logo {
      font-family: 'Syne', Georgia, serif;
      font-size: 32px; font-weight: 900;
      color: #c8f135; letter-spacing: -1px;
    }
    #loading-logo span { color: white; }
    #loading-sub { font-size: 13px; color: rgba(255,255,255,0.4); }
    #loading-spin {
      width: 28px; height: 28px;
      border: 2.5px solid rgba(200,241,53,0.25);
      border-top-color: #c8f135;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Touch target minimum 44px for all buttons */
    button { min-height: 44px; cursor: pointer; }
    input, textarea, select { min-height: 44px; font-size: 16px !important; }

    /* Prevent text selection on tap */
    button, .tap-target { -webkit-user-select: none; user-select: none; }

    /* Smooth momentum scrolling everywhere */
    * { -webkit-overflow-scrolling: touch; }

    /* Remove iOS input shadows */
    input, textarea {
      -webkit-appearance: none;
      appearance: none;
      border-radius: 10px;
    }

    /* iOS add to home screen banner */
    #ios-install {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #1a3a2e;
      border-top: 1px solid rgba(200,241,53,0.3);
      padding: 14px 16px;
      padding-bottom: max(var(--sab), 14px);
      z-index: 9998;
      font-family: -apple-system, sans-serif;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="loading">
    <div id="loading-logo">Padel<span>Rank</span></div>
    <div id="loading-sub">Loading your game...</div>
    <div id="loading-spin"></div>
  </div>
  <div id="root"><div id="app-wrapper"></div></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;


// ─── Design tokens ────────────────────────────────────────────────────────────
const T = {
  court:"#0f2318",courtMid:"#1a3a2e",courtLight:"#244d3c",
  lime:"#c8f135",limeDim:"#9abf1e",limeText:"#3d5c00",
  surface:"#f5f6f2",card:"#ffffff",
  border:"rgba(0,0,0,0.08)",borderMed:"rgba(0,0,0,0.13)",
  text:"#111111",muted:"#6b7280",mutedLight:"#9ca3af",
  danger:"#dc2626",dangerBg:"#fef2f2",
  success:"#16a34a",successBg:"#f0fdf4",
  warn:"#d97706",warnBg:"#fffbeb",
  info:"#2563eb",infoBg:"#eff6ff",
};

// ─── Locations ────────────────────────────────────────────────────────────────
const LOCATIONS = [
  { id:"miami",      label:"Miami",          emoji:"🌊", sub:"Brickell · Wynwood · Coral Gables" },
  { id:"ftlauderdale",label:"Fort Lauderdale",emoji:"🎾", sub:"Downtown · Las Olas · Wilton Manors" },
  { id:"bocaraton",  label:"Boca Raton",     emoji:"🌴", sub:"Mizner · West Boca · Delray" },
  { id:"palmbeach",  label:"Palm Beach",     emoji:"☀️", sub:"West Palm · Wellington · Jupiter" },
  { id:"naples",     label:"Naples",         emoji:"🏖️", sub:"Naples · Marco Island · Bonita Springs" },
];

// ─── Tiers ────────────────────────────────────────────────────────────────────
const TIERS = [
  { id:"novice",       label:"Novice",        range:"1.0–3.0", min:1.0, max:3.0,  color:"#e8f5e9", tc:"#1b5e20", abbr:"NV" },
  { id:"intermediate", label:"Intermediate",  range:"3.1–3.9", min:3.1, max:3.9,  color:"#e3f2fd", tc:"#0d47a1", abbr:"IM" },
  { id:"interplus",    label:"Intermediate+", range:"4.0–5.0", min:4.0, max:5.0,  color:"#fff8e1", tc:"#e65100", abbr:"I+" },
  { id:"advanced",     label:"Advanced",      range:"5.1–6.5", min:5.1, max:6.5,  color:"#fce4ec", tc:"#880e4f", abbr:"AV" },
  { id:"elite",        label:"Elite",         range:"6.5+",    min:6.5, max:10,   color:"#ede7f6", tc:"#4527a0", abbr:"EL" },
];

function getTier(r){for(let i=TIERS.length-1;i>=0;i--)if(r>=TIERS[i].min)return TIERS[i];return TIERS[0];}
function getAccessibleTierIds(r){const idx=TIERS.findIndex(t=>t.id===getTier(r).id);return TIERS.slice(0,idx+1).map(t=>t.id);}
function getMatchTier(m){const ids=m.tierIds||(m.tierId?[m.tierId]:["interplus"]);return TIERS.find(t=>t.id===ids[0])||TIERS[2];}
function getMatchTierIds(m){return m.tierIds||(m.tierId?[m.tierId]:["interplus"]);}
function chatKey(tierId, locationId){ return `${tierId}__${locationId}`; }
function timeAgoStr(ts){if(!ts)return"";const m=Math.round((Date.now()-ts)/60000);if(m<1)return"Just now";if(m<60)return`${m}m ago`;return`${Math.round(m/60)}h ago`;}

// ─── Admin ────────────────────────────────────────────────────────────────────
const ADMIN_CODE = "padelrank2026";
async function savePendingUser(app){try{const e=await loadAllApplications();localStorage.setItem("pr_applications",JSON.stringify([app,...e.filter(a=>a.id!==app.id)]));}catch(e){}}
async function loadAllApplications(){try{const r=({value: localStorage.getItem("pr_applications")});return r?JSON.parse(r.value):[]}catch{return[];}}
async function updateApplicationStatus(id,status,note=""){try{const all=await loadAllApplications();const up=all.map(a=>a.id===id?{...a,status,adminNote:note,reviewedAt:Date.now()}:a);localStorage.setItem("pr_applications",JSON.stringify(up));return up;}catch{return[];}}

// ─── Seed data ────────────────────────────────────────────────────────────────
const SEED_COURTS = [
  { id:"c1", name:"Sportspark Padel", address:"2501 NE 8th St", city:"Fort Lauderdale", locationId:"ftlauderdale", lat:26.122, lng:-80.137, rating:4.8, courts:6 },
  { id:"c2", name:"Las Olas Padel",   address:"1 Las Olas Blvd", city:"Fort Lauderdale", locationId:"ftlauderdale", lat:26.118, lng:-80.131, rating:4.6, courts:4 },
  { id:"c3", name:"Rally Padel Boca", address:"123 Mizner Blvd", city:"Boca Raton", locationId:"bocaraton", lat:26.356, lng:-80.082, rating:4.9, courts:8 },
  { id:"c4", name:"Miami Padel Club", address:"800 Brickell Ave", city:"Miami", locationId:"miami", lat:25.761, lng:-80.192, rating:4.7, courts:5 },
  { id:"c5", name:"Palm Beach Padel", address:"200 Clematis St", city:"West Palm Beach", locationId:"palmbeach", lat:26.712, lng:-80.054, rating:4.5, courts:4 },
  { id:"c6", name:"Wynwood Padel",    address:"265 NW 24th St", city:"Miami", locationId:"miami", lat:25.802, lng:-80.200, rating:4.7, courts:3 },
];

const SEED_MATCHES = [
  { id:"m1", tierIds:["advanced"], locationId:"ftlauderdale", title:"Saturday Doubles", date:"2026-03-28", time:"10:00", venue:"Sportspark Padel", address:"2501 NE 8th St, Fort Lauderdale, FL", notes:"Friendly game!", createdBy:"Carlos R.", creatorRating:5.8, players:["Carlos R.","Laura M."], maxPlayers:4, playerRatings:{"Carlos R.":5.8,"Laura M.":5.4}, mode:"friendly", joinRequests:[], status:"open", createdAt:Date.now()-3600000 },
  { id:"m2", tierIds:["interplus","advanced"], locationId:"ftlauderdale", title:"Sunday Morning Match", date:"2026-03-29", time:"09:00", venue:"Las Olas Padel", address:"1 Las Olas Blvd, Fort Lauderdale, FL", notes:"Bring water!", createdBy:"Sofia K.", creatorRating:4.5, players:["Sofia K.","Marcos T.","Ana P."], maxPlayers:4, playerRatings:{"Sofia K.":4.5,"Marcos T.":4.8,"Ana P.":4.2}, mode:"competitive", joinRequests:[], status:"open", createdAt:Date.now()-7200000 },
  { id:"m3", tierIds:["intermediate"], locationId:"bocaraton", title:"Weekday Evening", date:"2026-04-01", time:"19:30", venue:"Rally Padel Boca", address:"123 Mizner Blvd, Boca Raton, FL", notes:"Quick game after work", createdBy:"David W.", creatorRating:3.5, players:["David W."], maxPlayers:4, playerRatings:{"David W.":3.5}, mode:"friendly", joinRequests:[], status:"open", createdAt:Date.now()-900000 },
  { id:"m4", tierIds:["elite"], locationId:"miami", title:"Elite Sunday Session", date:"2026-03-30", time:"08:00", venue:"Miami Padel Club", address:"800 Brickell Ave, Miami, FL", notes:"High level only", createdBy:"Rafael D.", creatorRating:7.2, players:["Rafael D.","Mia C."], maxPlayers:4, playerRatings:{"Rafael D.":7.2,"Mia C.":6.8}, mode:"competitive", joinRequests:[], status:"open", createdAt:Date.now()-1800000 },
];

const buildSeedChats = () => {
  const base = {};
  TIERS.forEach(tier => {
    LOCATIONS.forEach(loc => {
      const k = chatKey(tier.id, loc.id);
      if (tier.id === "advanced" && loc.id === "ftlauderdale")
        base[k] = [
          { id:1, sender:"Miguel F.", text:"Tournament prep this weekend, who's training?", mine:false, time:"10:00" },
          { id:2, sender:"Sara V.", text:"I'm in, same courts as last week?", mine:false, time:"10:05" },
        ];
      else if (tier.id === "interplus" && loc.id === "ftlauderdale")
        base[k] = [
          { id:1, sender:"Carlos R.", text:"Anyone up for doubles Saturday at Sportspark?", mine:false, time:"9:14" },
          { id:2, sender:"Laura M.", text:"I'm in! Need one more", mine:false, time:"9:15" },
        ];
      else if (tier.id === "intermediate" && loc.id === "bocaraton")
        base[k] = [
          { id:1, sender:"Pedro A.", text:"New court opened near Mizner, anyone tried it?", mine:false, time:"8:30" },
        ];
      else if (tier.id === "elite" && loc.id === "miami")
        base[k] = [
          { id:1, sender:"Rafael D.", text:"WPT highlights last night — insane backwall shots", mine:false, time:"11:00" },
        ];
      else base[k] = [];
    });
  });
  return base;
};

const SEED_SQUADS = [
  { id:"sq1", name:"Thursday Night Crew", locationId:"ftlauderdale", members:["Carlos R.","Laura M.","Sofia K.","Miguel F."], createdBy:"Carlos R.", tierIds:["advanced","interplus"], description:"Weekly Thursday evenings at Sportspark", isPrivate:false, createdAt:Date.now()-86400000*7 },
];

// ─── Shared UI ────────────────────────────────────────────────────────────────
function Avatar({initials, size=40, bg=T.courtMid, color=T.lime, radius="50%"}) {
  return <div style={{width:size,height:size,borderRadius:radius,background:bg,color,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:size*0.33,flexShrink:0,letterSpacing:"-0.5px"}}>{initials}</div>;
}
function Badge({label, bg, color, size=11}) {
  return <span style={{background:bg,color,fontSize:size,fontWeight:600,padding:"3px 8px",borderRadius:6}}>{label}</span>;
}
function Pill({children, variant="default"}) {
  const vs={default:{bg:T.surface,color:T.muted},success:{bg:T.successBg,color:T.success},warn:{bg:T.warnBg,color:T.warn},danger:{bg:T.dangerBg,color:T.danger},lime:{bg:"#edfbc2",color:T.limeText},blue:{bg:T.infoBg,color:T.info}};
  const v=vs[variant];
  return <span style={{...v,fontSize:11,fontWeight:600,padding:"3px 9px",borderRadius:20}}>{children}</span>;
}

function Btn({children, onClick, variant="primary", size="md", disabled=false, full=false, style:ext={}}) {
  const [hover, setHover] = useState(false);
  const vs={primary:{bg:T.lime,color:T.court,border:"none"},dark:{bg:T.courtMid,color:T.lime,border:"none"},outline:{bg:"transparent",color:T.courtMid,border:`1.5px solid ${T.courtMid}`},ghost:{bg:"transparent",color:T.muted,border:`1px solid ${T.borderMed}`},danger:{bg:T.dangerBg,color:T.danger,border:"1px solid #fca5a5"},success:{bg:T.successBg,color:T.success,border:"1px solid #86efac"}};
  const ss={sm:{padding:"7px 14px",fontSize:12,borderRadius:10},md:{padding:"12px 20px",fontSize:14,borderRadius:12},lg:{padding:"15px 24px",fontSize:15,borderRadius:14}};
  const v=vs[variant]; const s=ss[size];
  return (
    <button onClick={onClick} disabled={disabled} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} style={{...v,...s,fontFamily:"'Syne',sans-serif",fontWeight:700,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.45:hover?0.88:1,width:full?"100%":"auto",transition:"opacity 0.15s,transform 0.1s",transform:hover&&!disabled?"translateY(-1px)":"none",...ext}}>
      {children}
    </button>
  );
}

function Input({label, value, onChange, type="text", placeholder="", required=false, min, max}) {
  return (
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      <label style={{fontSize:12,fontWeight:600,color:T.courtMid,letterSpacing:"0.3px"}}>{label}{required && <span style={{color:T.danger}}> *</span>}</label>
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} min={min} max={max} style={{border:`1px solid ${T.borderMed}`,borderRadius:10,padding:"10px 13px",fontSize:14,fontFamily:"'DM Sans',sans-serif",background:T.card,color:T.text,outline:"none",width:"100%",boxSizing:"border-box"}}/>
    </div>
  );
}

function Textarea({label, value, onChange, placeholder="", rows=3}) {
  return (
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      <label style={{fontSize:12,fontWeight:600,color:T.courtMid}}>{label}</label>
      <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{border:`1px solid ${T.borderMed}`,borderRadius:10,padding:"10px 13px",fontSize:14,fontFamily:"'DM Sans',sans-serif",background:T.card,color:T.text,outline:"none",width:"100%",boxSizing:"border-box",resize:"none"}}/>
    </div>
  );
}

function Divider({label}) {
  return <div style={{display:"flex",alignItems:"center",gap:10,margin:"4px 0"}}><div style={{flex:1,height:1,background:T.border}}/>{label && <span style={{fontSize:11,color:T.muted}}>{label}</span>}<div style={{flex:1,height:1,background:T.border}}/></div>;
}
function CheckIcon() { return <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>; }
function LockIcon({size=14}) { return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={T.muted} strokeWidth="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>; }
function BackIcon() { return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M15 18l-6-6 6-6"/></svg>; }
function SendIcon() { return <svg width="16" height="16" viewBox="0 0 24 24" fill={T.lime}><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>; }
function PlusIcon() { return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>; }
function MapPinIcon({size=13}) { return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>; }
function UsersIcon({size=13}) { return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>; }
function CalendarIcon() { return <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>; }
function StarIcon({filled=false, size=13}) { return <svg width={size} height={size} viewBox="0 0 24 24" fill={filled?"#f59e0b":"none"} stroke="#f59e0b" strokeWidth="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>; }
function ShieldIcon() { return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>; }

function AppHeader({subtitle}) {
  return (
    <div style={{background:T.court,paddingTop:"max(env(safe-area-inset-top, 0px), 20px)",paddingBottom:16,paddingLeft:20,paddingRight:20}}>
      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22,color:T.lime,letterSpacing:"-0.5px"}}>Padel<span style={{color:"white"}}>Rank</span></div>
      {subtitle && <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",marginTop:2,letterSpacing:"0.5px",textTransform:"uppercase"}}>{subtitle}</div>}
    </div>
  );
}


// ─── NavBar ───────────────────────────────────────────────────────────────────
const NavBar=({active,onSwitch,notifCount=0})=>{
  const items=[
    {id:"chats",label:"Chats",icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>},
    {id:"matches",label:"Matches",icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>},
    {id:"courts",label:"Courts",icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>},
    {id:"squads",label:"Squads",icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>},
    {id:"profile",label:"Profile",icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>},
  ];
  return(
    <div style={{display:"flex",background:T.card,borderTop:`0.5px solid ${T.border}`,paddingBottom:"max(env(safe-area-inset-bottom, 4px), 4px)"}}>
      {items.map(item=>(

// ─── Location picker ──────────────────────────────────────────────────────────
const LocationPickerScreen=({onSelect})=>{
  const[detecting,setDetecting]=useState(false);
  const detect=()=>{
    setDetecting(true);
    navigator.geolocation?.getCurrentPosition(pos=>{
      const{latitude:lat,longitude:lng}=pos.coords;
      // Simple nearest-city calc
      const dists=LOCATIONS.map(l=>{
        const centers={miami:[25.77,-80.19],ftlauderdale:[26.12,-80.14],bocaraton:[26.36,-80.09],palmbeach:[26.71,-80.06],naples:[26.14,-81.80]};
        const[clat,clng]=centers[l.id]||[26,80];
        return{id:l.id,d:Math.hypot(lat-clat,lng-clng)};
      });
      dists.sort((a,b)=>a.d-b.d);
      setDetecting(false);
      onSelect(dists[0].id);
    },()=>setDetecting(false));
  };
  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:"100dvh"}}>
      <AppHeader subtitle="Pick your location"/>
      <div style={{padding:20,flex:1,display:"flex",flexDirection:"column",gap:16}}>
        <div>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:20,marginBottom:4}}>Where do you play?</div>
          <div style={{fontSize:13,color:T.muted,lineHeight:1.6}}>Choose your area to join local chats and see nearby matches.</div>
        </div>
        <button onClick={detect} disabled={detecting} style={{display:"flex",alignItems:"center",gap:10,background:T.infoBg,border:`1px solid #bfdbfe`,borderRadius:12,padding:"12px 14px",cursor:"pointer",width:"100%"}}>
          <span style={{fontSize:18}}>📍</span>
          <div style={{flex:1,textAlign:"left"}}>
            <div style={{fontSize:13,fontWeight:700,color:T.info}}>{detecting?"Detecting...":"Use my current location"}</div>
            <div style={{fontSize:11,color:"#3b82f6",marginTop:1}}>Auto-detect nearest city</div>
          </div>
          {detecting&&<div style={{width:16,height:16,borderRadius:"50%",border:"2px solid #3b82f6",borderTopColor:"transparent",animation:"spin 0.8s linear infinite"}}/>}
        </button>
        <Divider label="or choose manually"/>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {LOCATIONS.map(loc=>(
            <button key={loc.id} onClick={()=>onSelect(loc.id)} style={{display:"flex",alignItems:"center",gap:12,background:T.card,border:`0.5px solid ${T.borderMed}`,borderRadius:14,padding:"14px",cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
              <div style={{width:44,height:44,borderRadius:12,background:T.court,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{loc.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:T.text}}>{loc.label}</div>
                <div style={{fontSize:11,color:T.muted,marginTop:2}}>{loc.sub}</div>
              </div>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.muted} strokeWidth="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          ))}
        </div>
      </div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
};

const VerifyScreen=({onVerified,onAdminLogin})=>{
  const[file,setFile]=useState(null);
  const[screenshotBase64,setScreenshotBase64]=useState(null);
  const[analyzing,setAnalyzing]=useState(false);
  const[analyzeStep,setAnalyzeStep]=useState("");
  const[result,setResult]=useState(null);
  const[error,setError]=useState(null);

  const[submitted,setSubmitted]=useState(false);
  const fileRef=useRef();

  const handleFile=useCallback(async(f)=>{
    if(!f)return;
    setFile(f);setAnalyzing(true);setResult(null);setError(null);
    const steps=["Reading your Playtomic profile...","Detecting player name & rating...","Checking for tampering...","Confirming tier placement..."];
    let si=0;setAnalyzeStep(steps[0]);
    const iv=setInterval(()=>{si=(si+1)%steps.length;setAnalyzeStep(steps[si]);},1800);
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(",")[1]);r.onerror=()=>rej();r.readAsDataURL(f);});
      setScreenshotBase64(`data:${f.type||"image/jpeg"};base64,${b64}`);
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:f.type||"image/jpeg",data:b64}},{type:"text",text:'Playtomic profile screenshot. Extract player name and numeric rating/level. Respond ONLY with valid JSON: {"name":"player name","rating":6.2,"looksAuthentic":true,"suspiciousReason":""}. If no rating set null. If tampered set looksAuthentic false.'}]}]})});
      clearInterval(iv);
      const data=await resp.json();
      let parsed={name:"Player",rating:null,looksAuthentic:true};
      try{parsed=JSON.parse(data.content.map(i=>i.text||"").join("").replace(/```json|```/g,"").trim());}catch(_){}
      if(!parsed.looksAuthentic){setError(`Screenshot flagged: ${parsed.suspiciousReason||"does not look like a genuine Playtomic profile"}.`);setAnalyzing(false);return;}
      if(!parsed.rating){setError("No rating detected. Make sure your Playtomic rating is visible.");setAnalyzing(false);return;}
      setResult({name:parsed.name||"Player",rating:parseFloat(parsed.rating)});
    }catch(e){clearInterval(iv);setError("Could not analyze image. Please try again.");}
    setAnalyzing(false);

          </div>

          <button onClick={()=>setShowAllLocations(false)} style={{background:!showAllLocations?T.courtMid:T.surface,color:!showAllLocations?T.lime:T.muted,border:"none",borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>{loc.emoji} {loc.label}</button>

            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {TIERS.filter(t=>accessibleIds.includes(t.id)).reverse().map(t=>{

                    <div style={{flex:1,minWidth:0}}>

                      <div style={{background:T.court,color:T.lime,fontSize:9,fontWeight:700,borderRadius:6,padding:"2px 5px",whiteSpace:"nowrap"}}>{[51,84,63,29,11][TIERS.findIndex(x=>x.id===t.id)]} online</div>
                    </div>
                  </div>
                );
              })}
              {/* Locked tiers */}
              {TIERS.filter(t=>!accessibleIds.includes(t.id)).map(t=>(
                <div key={chatKey(t.id,location.id)} style={{background:T.card,border:`0.5px solid ${T.border}`,borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,opacity:0.4}}>
                  <div style={{width:40,height:40,borderRadius:10,background:t.color,color:t.tc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>{t.abbr}</div>
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{t.label}</div><div style={{fontSize:11,color:T.muted}}>Requires rating {t.range}</div></div>
                  <LockIcon/>
                </div>
              ))}
            </div>
            {showAllLocations&&<div style={{height:1,background:T.border,margin:"12px 0"}}/>}
          </div>
        ))}
      </div>
    </div>
  );
};

// ─── Chat Room ────────────────────────────────────────────────────────────────
const ChatRoomScreen=({user,tier,location,msgs,onSend,onBack,onViewMatch,liveMatches})=>{
  const[input,setInput]=useState("");
  const bottomRef=useRef();
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  const send=()=>{
    if(!input.trim())return;
    const now=new Date();
    onSend(chatKey(tier.id,location.id),{id:Date.now(),sender:"You",text:input.trim(),mine:true,time:`${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`});
    setInput("");
  };
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100dvh"}}>
      <div style={{background:T.court,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,0.1)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"white"}}><BackIcon/></button>
        <div style={{width:36,height:36,borderRadius:9,background:tier.color,color:tier.tc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>{tier.abbr}</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,color:"white"}}>{tier.label}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",marginTop:1}}>{location.emoji} {location.label} · verified chat</div>
        </div>
        <div style={{width:8,height:8,borderRadius:"50%",background:T.success}}/>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px",display:"flex",flexDirection:"column",gap:10,background:T.surface}}>
        <div style={{textAlign:"center",fontSize:11,color:T.muted,background:T.card,borderRadius:20,padding:"4px 12px",alignSelf:"center",border:`0.5px solid ${T.border}`}}>Today · {location.label}</div>
        {msgs.map(m=>{
          if(m.type==="match_card"){
            const lm=liveMatches?.find(x=>x.id===m.match.id)||m.match;
            const spots=lm.maxPlayers-lm.players.length;
            const isJoined=lm.players.includes(user.name);
            const isPending=!isJoined&&(lm.joinRequests||[]).some(r=>r.name===user.name&&r.status==="pending");
            const isComp=lm.mode==="competitive";
            return(
              <div key={m.id} style={{alignSelf:"flex-start",maxWidth:"92%",display:"flex",flexDirection:"column",gap:3}}>
                <div style={{fontSize:11,color:T.muted,marginLeft:4}}>{m.sender} posted a match</div>
                <div style={{background:T.card,border:`1px solid ${T.borderMed}`,borderRadius:"14px 14px 14px 4px",overflow:"hidden"}}>
                  <div style={{background:T.courtMid,padding:"10px 14px 8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,color:"white"}}>{lm.title}</div>
                    <div style={{background:isComp?"rgba(252,165,165,0.25)":"rgba(134,239,172,0.25)",color:isComp?"#fca5a5":"#86efac",fontSize:10,fontWeight:700,borderRadius:10,padding:"2px 7px"}}>{isComp?"⚔ Comp":"🤝 Friendly"}</div>
                  </div>
                  <div style={{padding:"10px 14px 12px"}}>
                    <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:T.muted}}><CalendarIcon/> {lm.date} · {lm.time}</div>
                      <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:T.muted}}><MapPinIcon/> {lm.venue}</div>
                      <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:spots>0?T.success:T.muted,fontWeight:spots>0?600:400}}><UsersIcon/> {lm.players.length}/{lm.maxPlayers}{spots>0?` · ${spots} spot${spots>1?"s":""} open`:" · Full"}</div>
                    </div>
                    {isJoined?<div style={{textAlign:"center",background:T.successBg,color:T.success,border:"1px solid #86efac",borderRadius:9,padding:"8px",fontSize:12,fontWeight:700}}>✓ Joined</div>:isPending?<div style={{textAlign:"center",background:T.warnBg,color:T.warn,border:"1px solid #fde68a",borderRadius:9,padding:"8px",fontSize:12,fontWeight:700}}>⏳ Pending approval</div>:<button onClick={()=>onViewMatch&&onViewMatch(lm)} style={{width:"100%",background:spots>0?T.lime:T.surface,color:spots>0?T.courtMid:T.muted,border:"none",borderRadius:9,padding:"8px",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:12,cursor:spots>0?"pointer":"default"}}>{spots>0?"View & request to join →":"View match (full)"}</button>}
                  </div>
                </div>
                <div style={{fontSize:10,color:T.mutedLight,marginLeft:4}}>{m.time}</div>
              </div>
            );
          }
          return(
            <div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:m.mine?"flex-end":"flex-start",gap:3,maxWidth:"80%",alignSelf:m.mine?"flex-end":"flex-start"}}>
              {!m.mine&&<div style={{fontSize:11,color:T.muted,marginLeft:4}}>{m.sender}</div>}
              <div style={{background:m.mine?T.courtMid:T.card,color:m.mine?"white":T.text,borderRadius:m.mine?"14px 14px 4px 14px":"14px 14px 14px 4px",padding:"10px 13px",fontSize:13,lineHeight:1.5,border:m.mine?"none":`0.5px solid ${T.border}`}}>{m.text}</div>
              <div style={{fontSize:10,color:T.mutedLight}}>{m.time}</div>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:"10px 12px",background:T.card,borderTop:`0.5px solid ${T.border}`,display:"flex",gap:8,alignItems:"center"}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Message..." style={{flex:1,border:`1px solid ${T.borderMed}`,borderRadius:20,padding:"9px 14px",fontSize:13,fontFamily:"'DM Sans',sans-serif",background:T.surface,outline:"none"}}/>
        <button onClick={send} style={{width:38,height:38,borderRadius:"50%",background:T.courtMid,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><SendIcon/></button>
      </div>
    </div>
  );
};


// ─── Match Card ───────────────────────────────────────────────────────────────
const MatchCard=({match,user,onView,onJoin,pendingCount=0})=>{
  const tier=getMatchTier(match);
  const matchLoc=LOCATIONS.find(l=>l.id===match.locationId)||LOCATIONS[1];
  const spotsLeft=match.maxPlayers-match.players.length;
  const isFull=spotsLeft===0;
  const isJoined=match.players.includes(user.name);
  const isCreator=match.createdBy===user.name;
  const isPending=!isJoined&&(match.joinRequests||[]).some(r=>r.name===user.name&&r.status==="pending");
  const isDeclined=!isJoined&&(match.joinRequests||[]).some(r=>r.name===user.name&&r.status==="declined");
  const dateStr=new Date(match.date+"T"+match.time).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  const ratings=Object.values(match.playerRatings||{});
  const avgRating=ratings.length>0?(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1):null;
  const isComp=match.mode==="competitive";
  return(
    <div style={{background:T.card,border:`0.5px solid ${isPending?"#fde68a":isCreator&&pendingCount>0?"#fca5a5":T.border}`,borderRadius:16,overflow:"hidden",position:"relative"}}>
      {isCreator&&pendingCount>0&&<div style={{position:"absolute",top:10,right:10,background:"#ef4444",color:"white",fontSize:9,fontWeight:800,borderRadius:20,padding:"2px 6px",zIndex:2}}>{pendingCount} req</div>}
      <div style={{padding:"13px 14px 11px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:7,paddingRight:isCreator&&pendingCount>0?55:0}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,flex:1,paddingRight:8}}>{match.title}</div>
          <Badge label={tier.label} bg={tier.color} color={tier.tc}/>
        </div>
        <div style={{display:"flex",gap:7,marginBottom:9,flexWrap:"wrap"}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:4,background:isComp?"#fff0f0":"#f0fdf4",color:isComp?"#b91c1c":"#15803d",border:`1px solid ${isComp?"#fca5a5":"#86efac"}`,borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>{isComp?"⚔":"🤝"} {isComp?"Competitive":"Friendly"}</div>
          {avgRating&&<div style={{display:"inline-flex",alignItems:"center",gap:3,background:T.surface,borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:600,color:T.courtMid,border:`1px solid ${T.borderMed}`}}><StarIcon filled size={10}/> Avg {avgRating}</div>}
          <div style={{display:"inline-flex",alignItems:"center",gap:3,background:T.surface,borderRadius:20,padding:"2px 8px",fontSize:10,color:T.muted,border:`1px solid ${T.borderMed}`}}>{matchLoc.emoji} {matchLoc.label}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:9}}>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:T.muted}}><CalendarIcon/> {dateStr} at {match.time}</div>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:T.muted}}><MapPinIcon/> {match.venue}</div>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:T.muted}}><UsersIcon/> {match.players.length}/{match.maxPlayers} · {isCreator?"you created":`by ${match.createdBy}`}</div>
        </div>
        <div style={{display:"flex",alignItems:"center"}}>
          {Array.from({length:match.maxPlayers}).map((_,i)=>match.players[i]?<div key={i} style={{width:26,height:26,borderRadius:"50%",background:T.courtMid,border:"2px solid white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:800,color:T.lime,marginLeft:i>0?-5:0}}>{match.players[i].split(" ").map(w=>w[0]).join("").substring(0,2)}</div>:<div key={i} style={{width:26,height:26,borderRadius:"50%",background:T.surface,border:`2px dashed ${T.borderMed}`,marginLeft:i>0?-5:0}}/>)}
          {!isFull&&<div style={{marginLeft:8,fontSize:11,color:T.success,fontWeight:600}}>{spotsLeft} spot{spotsLeft>1?"s":""} left</div>}
          {isFull&&<div style={{marginLeft:8,fontSize:11,color:T.muted}}>Full</div>}
        </div>
      </div>
      <div style={{borderTop:`0.5px solid ${T.border}`,padding:"9px 14px",display:"flex",gap:8,alignItems:"center",background:T.surface}}>
        <Btn variant="ghost" size="sm" onClick={onView}>{isCreator&&pendingCount>0?"Manage requests":"View details"}</Btn>
        <div style={{flex:1}}/>
        {!isJoined&&!isPending&&!isDeclined&&!isFull&&!isCreator&&<Btn variant="dark" size="sm" onClick={onJoin}>Request to join</Btn>}
        {isPending&&<div style={{background:T.warnBg,color:T.warn,border:"1px solid #fde68a",borderRadius:20,padding:"4px 9px",fontSize:10,fontWeight:700}}>⏳ Pending</div>}
        {isDeclined&&<div style={{background:T.dangerBg,color:T.danger,border:"1px solid #fca5a5",borderRadius:20,padding:"4px 9px",fontSize:10,fontWeight:700}}>✕ Declined</div>}
        {isJoined&&!isCreator&&<Pill variant="success">✓ Joined</Pill>}
        {isFull&&!isJoined&&!isPending&&!isCreator&&<Pill variant="warn">Full</Pill>}
        {isCreator&&<Pill variant="lime">Organizer</Pill>}
      </div>
    </div>
  );
};

// ─── Matches Tab ──────────────────────────────────────────────────────────────
const MatchesTab=({user,matches,onViewMatch,onCreateMatch,onJoin})=>{
  const userTier=getTier(user.rating);
  const userLoc=LOCATIONS.find(l=>l.id===user.locationId)||LOCATIONS[1];
  const[filter,setFilter]=useState("all");
  const[locFilter,setLocFilter]=useState(user.locationId||"ftlauderdale");

  const tierMatches=matches.filter(m=>getMatchTierIds(m).includes(userTier.id));
  const myTierOpen=tierMatches.filter(m=>m.locationId===locFilter&&!m.players.includes(user.name)&&m.status==="open"&&!(m.joinRequests||[]).some(r=>r.name===user.name&&r.status!=="declined"));
  const myJoined=matches.filter(m=>m.players.includes(user.name));
  const myCreated=matches.filter(m=>m.createdBy===user.name);
  const myPending=matches.filter(m=>(m.joinRequests||[]).some(r=>r.name===user.name&&r.status==="pending"));
  const pendingApproval=myCreated.reduce((acc,m)=>acc+(m.joinRequests||[]).filter(r=>r.status==="pending").length,0);

  const displayList=filter==="all"?myTierOpen:filter==="mine"?[...myJoined,...myPending.filter(m=>!m.players.includes(user.name))]:myCreated;

  return(
    <div style={{flex:1,overflow:"auto",position:"relative"}}>
      <div style={{background:T.court,paddingTop:"max(env(safe-area-inset-top, 0px), 20px)",paddingBottom:0,paddingLeft:20,paddingRight:20}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22,color:T.lime}}>Padel<span style={{color:"white"}}>Rank</span></div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",marginTop:2}}>{userTier.label} · {myTierOpen.length} open in {userLoc.label}</div>
          </div>
          <button onClick={onCreateMatch} style={{display:"flex",alignItems:"center",gap:6,background:T.lime,color:T.court,border:"none",borderRadius:12,padding:"9px 14px",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,cursor:"pointer"}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.court} strokeWidth="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New match
          </button>
        </div>
        {/* Location filter */}
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:10}}>
          {LOCATIONS.map(l=>(
            <button key={l.id} onClick={()=>setLocFilter(l.id)} style={{display:"flex",alignItems:"center",gap:4,background:locFilter===l.id?"rgba(200,241,53,0.15)":"rgba(255,255,255,0.08)",color:locFilter===l.id?T.lime:"rgba(255,255,255,0.55)",border:locFilter===l.id?`1px solid rgba(200,241,53,0.3)`:"1px solid transparent",borderRadius:20,padding:"5px 12px",fontSize:11,fontWeight:locFilter===l.id?700:400,cursor:"pointer",whiteSpace:"nowrap"}}>
              {l.emoji} {l.label}
            </button>
          ))}
        </div>
        <div style={{display:"flex",borderTop:"1px solid rgba(255,255,255,0.08)"}}>
          {[["all","Open",null],["mine","Joined",myPending.length>0?myPending.length:null],["created","My matches",pendingApproval>0?pendingApproval:null]].map(([id,label,badge])=>(
            <button key={id} onClick={()=>setFilter(id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"10px 0 12px",color:filter===id?T.lime:"rgba(255,255,255,0.45)",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:filter===id?700:400,borderBottom:filter===id?`2px solid ${T.lime}`:"2px solid transparent",position:"relative"}}>
              {label}{badge&&<span style={{position:"absolute",top:6,right:"calc(50% - 20px)",minWidth:15,height:15,borderRadius:8,background:id==="mine"?"#3b82f6":"#ef4444",color:"white",fontSize:9,fontWeight:800,display:"inline-flex",alignItems:"center",justifyContent:"center",padding:"0 3px"}}>{badge}</span>}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:"14px 14px 80px",display:"flex",flexDirection:"column",gap:12}}>
        {filter==="created"&&pendingApproval>0&&<div style={{background:T.warnBg,border:"1px solid #fde68a",borderRadius:12,padding:"11px 14px",display:"flex",gap:10}}><span style={{fontSize:18}}>⏳</span><div><div style={{fontSize:13,fontWeight:700,color:"#92400e"}}>{pendingApproval} pending request{pendingApproval>1?"s":""}</div><div style={{fontSize:11,color:"#b45309"}}>Tap a match to approve or decline players</div></div></div>}
        {filter==="mine"&&myPending.length>0&&<div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:12,padding:"11px 14px",display:"flex",gap:10}}><span style={{fontSize:18}}>🕐</span><div><div style={{fontSize:13,fontWeight:700,color:"#1d4ed8"}}>{myPending.length} request{myPending.length>1?"s":""} awaiting approval</div><div style={{fontSize:11,color:"#2563eb"}}>Organizer will approve or decline soon</div></div></div>}
        {displayList.length===0?(
          <div style={{textAlign:"center",padding:"48px 16px"}}>
            <div style={{fontSize:48,marginBottom:12}}>🎾</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:16,marginBottom:6}}>No matches here yet</div>
            <div style={{fontSize:13,color:T.muted,lineHeight:1.6,marginBottom:20}}>{filter==="all"?`No open matches in ${LOCATIONS.find(l=>l.id===locFilter)?.label||"this area"} yet.`:filter==="mine"?"You haven't joined any matches yet.":"You haven't created any matches yet."}</div>
            {filter!=="mine"&&<button onClick={onCreateMatch} style={{display:"inline-flex",alignItems:"center",gap:8,background:T.courtMid,color:T.lime,border:"none",borderRadius:12,padding:"11px 22px",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,cursor:"pointer"}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.lime} strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Create a match</button>}
          </div>
        ):displayList.map(m=>{
          const pc=(m.joinRequests||[]).filter(r=>r.status==="pending").length;
          return<MatchCard key={m.id} match={m} user={user} onView={()=>onViewMatch(m)} onJoin={()=>onJoin(m)} pendingCount={m.createdBy===user.name?pc:0}/>;
        })}
      </div>
      <button onClick={onCreateMatch} style={{position:"sticky",bottom:16,left:"50%",display:"flex",alignItems:"center",gap:8,margin:"0 auto",background:T.courtMid,color:T.lime,border:`2px solid ${T.lime}`,borderRadius:40,padding:"12px 22px",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,cursor:"pointer",zIndex:10}}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.lime} strokeWidth="2.8"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Create match
      </button>
    </div>
  );
};


// ─── Match Detail ─────────────────────────────────────────────────────────────
const MatchDetailScreen=({match,user,onBack,onJoin,onLeave,onDelete,onApproveRequest})=>{
  const tier=getMatchTier(match);
  const matchTierIds=getMatchTierIds(match);
  const matchLoc=LOCATIONS.find(l=>l.id===match.locationId)||LOCATIONS[1];
  const isJoined=match.players.includes(user.name);
  const isCreator=match.createdBy===user.name;
  const isFull=match.players.length>=match.maxPlayers;
  const isPendingRequest=!isCreator&&!isJoined&&(match.joinRequests||[]).some(r=>r.name===user.name&&r.status==="pending");
  const isComp=match.mode==="competitive";
  const ratings=Object.values(match.playerRatings||{});
  const avgRating=ratings.length>0?(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1):null;
  const dateStr=new Date(match.date+"T"+match.time).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});

  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:"100dvh"}}>
      <div style={{background:T.court,paddingTop:"max(env(safe-area-inset-top, 14px), 14px)",paddingBottom:20,paddingLeft:16,paddingRight:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <button onClick={onBack} style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,0.1)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"white"}}><BackIcon/></button>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,color:"white"}}>Match details</div>
        </div>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22,color:"white",marginBottom:10}}>{match.title}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          {matchTierIds.map(tid=>{const t=TIERS.find(x=>x.id===tid);return t?<Badge key={tid} label={t.label} bg="rgba(255,255,255,0.12)" color="rgba(255,255,255,0.85)"/>:null;})}
          <Badge label={match.status==="open"?"Open":"Full"} bg={match.status==="open"?"rgba(200,241,53,0.2)":"rgba(239,68,68,0.2)"} color={match.status==="open"?T.lime:"#fca5a5"}/>
          <div style={{display:"inline-flex",alignItems:"center",gap:4,background:isComp?"rgba(185,28,28,0.25)":"rgba(21,128,61,0.25)",color:isComp?"#fca5a5":"#86efac",border:`1px solid ${isComp?"rgba(252,165,165,0.4)":"rgba(134,239,172,0.4)"}`,borderRadius:20,padding:"3px 9px",fontSize:11,fontWeight:700}}>{isComp?"⚔ Competitive":"🤝 Friendly"}</div>
          {avgRating&&<div style={{display:"inline-flex",alignItems:"center",gap:4,background:"rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.85)",borderRadius:20,padding:"3px 9px",fontSize:11,fontWeight:600}}><StarIcon filled size={11}/> Avg {avgRating}</div>}
          <div style={{display:"inline-flex",alignItems:"center",gap:4,background:"rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.7)",borderRadius:20,padding:"3px 9px",fontSize:11}}>{matchLoc.emoji} {matchLoc.label}</div>
        </div>
      </div>
      <div style={{flex:1,overflow:"auto",padding:16,display:"flex",flexDirection:"column",gap:14}}>
        <div style={{background:isComp?"#fff0f0":"#f0fdf4",border:`1px solid ${isComp?"#fca5a5":"#86efac"}`,borderRadius:12,padding:"11px 14px",display:"flex",gap:10}}>
          <span style={{fontSize:18,lineHeight:1}}>{isComp?"⚔":"🤝"}</span>
          <div>
            <div style={{fontWeight:700,fontSize:13,color:isComp?"#b91c1c":"#15803d",marginBottom:2}}>{isComp?"Competitive match":"Friendly match"}</div>
            <div style={{fontSize:12,color:isComp?"#b91c1c":"#15803d",opacity:0.8,lineHeight:1.5}}>{isComp?"Scores tracked. Full intensity expected.":"Casual game for fun and practice."}</div>
          </div>
        </div>
        <div style={{background:T.card,border:`0.5px solid ${T.border}`,borderRadius:16,padding:16}}>
          {[{icon:<CalendarIcon/>,label:"Date & time",value:`${dateStr} · ${match.time}`},{icon:<MapPinIcon/>,label:"Venue",value:match.venue,sub:match.address},{icon:<span>{matchLoc.emoji}</span>,label:"Location",value:matchLoc.label+" · "+matchLoc.sub}].map((row,i)=>(
            <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 0",borderBottom:i<2?`0.5px solid ${T.border}`:"none"}}>
              <div style={{marginTop:1,color:T.muted}}>{row.icon}</div>
              <div><div style={{fontSize:11,color:T.muted,marginBottom:2}}>{row.label}</div><div style={{fontSize:13,fontWeight:500}}>{row.value}</div>{row.sub&&<div style={{fontSize:11,color:T.muted,marginTop:2}}>{row.sub}</div>}</div>
            </div>
          ))}
        </div>
        {/* Players */}
        <div style={{background:T.card,border:`0.5px solid ${T.border}`,borderRadius:16,padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:600,fontSize:13}}>Players ({match.players.length}/{match.maxPlayers})</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {avgRating&&<div style={{display:"flex",alignItems:"center",gap:3,fontSize:11,color:T.muted}}><StarIcon filled size={11}/> avg {avgRating}</div>}
              {!isFull&&<Pill variant="success">{match.maxPlayers-match.players.length} spot{match.maxPlayers-match.players.length>1?"s":""} open</Pill>}
              {isFull&&<Pill variant="warn">Full</Pill>}
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {Array.from({length:match.maxPlayers}).map((_,i)=>{
              const name=match.players[i];
              const pr=name?(match.playerRatings?.[name]??null):null;
              const pt=pr?getTier(pr):null;
              return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",borderRadius:10,background:name?T.surface:"transparent",border:name?"none":`1px dashed ${T.borderMed}`}}>
                  {name?<Avatar initials={name.split(" ").map(w=>w[0]).join("").substring(0,2)} size={34}/>:<div style={{width:34,height:34,borderRadius:"50%",background:T.surface,border:`1px dashed ${T.borderMed}`}}/>}
                  {name?<div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{name}</div><div style={{fontSize:11,color:T.muted,marginTop:1}}>{i===0?"Organizer":"Player"}</div></div>:<div style={{flex:1,fontSize:12,color:T.muted}}>Open spot</div>}
                  {name&&pr&&<div style={{display:"flex",alignItems:"center",gap:5}}><div style={{display:"flex",alignItems:"center",gap:2,background:pt.color,color:pt.tc,borderRadius:8,padding:"3px 7px",fontSize:11,fontWeight:700}}><StarIcon filled size={9}/>{pr.toFixed(1)}</div>{name===user.name&&<Pill variant="lime">You</Pill>}</div>}
                  {name&&!pr&&name===user.name&&<Pill variant="lime">You</Pill>}
                </div>
              );
            })}
          </div>
        </div>
        {/* Post-match rating prompt if joined */}
        {isJoined&&new Date(match.date+"T"+match.time)<new Date()&&<PostMatchRatingPanel match={match} user={user}/>}
        {match.notes&&<div style={{background:T.card,border:`0.5px solid ${T.border}`,borderRadius:16,padding:16}}><div style={{fontWeight:600,fontSize:13,marginBottom:6}}>Notes from organizer</div><div style={{fontSize:13,color:T.muted,lineHeight:1.6}}>{match.notes}</div></div>}
        {isCreator&&(()=>{
          const requests=match.joinRequests||[];
          const pending=requests.filter(r=>r.status==="pending");
          const decided=requests.filter(r=>r.status!=="pending");
          return(
            <div style={{background:T.card,border:`1.5px solid ${pending.length>0?"#fde68a":T.border}`,borderRadius:16,padding:16}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <div style={{fontWeight:700,fontSize:13}}>Join requests</div>
                {pending.length>0&&<span style={{background:T.warn,color:"white",fontSize:10,fontWeight:800,borderRadius:20,padding:"2px 8px"}}>{pending.length} pending</span>}
              </div>
              {requests.length===0&&<div style={{fontSize:12,color:T.muted,textAlign:"center",padding:"12px 0"}}>No requests yet. Share in the tier chat!</div>}
              {pending.map(req=>{const rt=getTier(req.rating);return(
                <div key={req.name} style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:12,padding:"11px 12px",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                    <Avatar initials={req.name.split(" ").map(w=>w[0]).join("").substring(0,2)} size={36}/>
                    <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{req.name}</div><div style={{fontSize:11,color:T.muted}}>Wants to join</div></div>
                    <div style={{display:"flex",alignItems:"center",gap:2,background:rt.color,color:rt.tc,borderRadius:8,padding:"3px 7px",fontSize:11,fontWeight:700}}><StarIcon filled size={9}/>{req.rating.toFixed(1)}</div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>onApproveRequest(match,req,false)} style={{flex:1,background:T.dangerBg,color:T.danger,border:"1px solid #fca5a5",borderRadius:9,padding:"8px",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:12,cursor:"pointer"}}>✕ Decline</button>
                    <button onClick={()=>onApproveRequest(match,req,true)} style={{flex:1,background:T.courtMid,color:T.lime,border:"none",borderRadius:9,padding:"8px",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:12,cursor:"pointer"}}>✓ Approve</button>
                  </div>
                </div>
              );})}
              {decided.length>0&&<div style={{display:"flex",flexDirection:"column",gap:6,marginTop:pending.length>0?8:0}}>{decided.map(req=><div key={req.name} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:10,background:T.surface}}><Avatar initials={req.name.split(" ").map(w=>w[0]).join("").substring(0,2)} size={30}/><div style={{flex:1,fontSize:12,fontWeight:500}}>{req.name}</div><Pill variant={req.status==="approved"?"success":"danger"}>{req.status==="approved"?"✓ Approved":"✕ Declined"}</Pill></div>)}</div>}
            </div>
          );
        })()}
        <div style={{background:T.warnBg,border:"1px solid #fde68a",borderRadius:14,padding:14}}>
          <div style={{fontWeight:600,fontSize:13,color:T.warn,marginBottom:6}}>⚠ Court booking via Playtomic</div>
          <div style={{fontSize:12,color:T.warn,lineHeight:1.6,opacity:0.85}}>Once joined, book the court on Playtomic. Organizer will coordinate in the tier chat.</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {!isJoined&&!isFull&&!isPendingRequest&&<Btn variant="dark" size="lg" full onClick={()=>onJoin(match)}>Request to join →</Btn>}
          {isPendingRequest&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:12,padding:"12px 14px",fontSize:13,color:T.warn,fontWeight:500,textAlign:"center"}}>⏳ Request sent — waiting for organizer approval</div>}
          {isJoined&&!isCreator&&<><div style={{background:T.successBg,border:"1px solid #86efac",borderRadius:12,padding:"12px 14px",fontSize:13,color:T.success,fontWeight:500,textAlign:"center"}}>✓ You've joined this match</div><Btn variant="ghost" size="sm" full onClick={()=>onLeave(match)}>Leave match</Btn></>}
          {isCreator&&<Btn variant="danger" size="sm" full onClick={()=>onDelete(match)}>Delete match</Btn>}
        </div>
      </div>
    </div>
  );
};

// ─── Post-match Rating Panel ──────────────────────────────────────────────────
const PostMatchRatingPanel=({match,user})=>{
  const[ratings,setRatings]=useState({});
  const[submitted,setSubmitted]=useState(false);
  const others=match.players.filter(p=>p!==user.name);
  if(submitted)return<div style={{background:T.successBg,border:"1px solid #86efac",borderRadius:14,padding:14,textAlign:"center",fontSize:13,color:T.success,fontWeight:600}}>✓ Thanks for rating your opponents!</div>;
  return(
    <div style={{background:T.card,border:`0.5px solid ${T.border}`,borderRadius:16,padding:16}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>⭐ Rate your opponents</div>
      <div style={{fontSize:11,color:T.muted,marginBottom:12}}>Did their rating accurately reflect their level?</div>
      {others.map(name=>(
        <div key={name} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,padding:"10px",background:T.surface,borderRadius:10}}>
          <Avatar initials={name.split(" ").map(w=>w[0]).join("").substring(0,2)} size={32}/>
          <div style={{flex:1,fontSize:13,fontWeight:500}}>{name}</div>
          <div style={{display:"flex",gap:4}}>
            {["👎","👌","👍"].map((emoji,ri)=>(
              <button key={ri} onClick={()=>setRatings(r=>({...r,[name]:ri}))} style={{width:32,height:32,borderRadius:8,border:"none",cursor:"pointer",background:ratings[name]===ri?T.courtMid:T.card,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>{emoji}</button>
            ))}
          </div>
        </div>
      ))}
      <Btn variant="dark" size="sm" full disabled={Object.keys(ratings).length<others.length} onClick={()=>setSubmitted(true)}>Submit ratings</Btn>
    </div>
  );
};

// ─── Create Match ─────────────────────────────────────────────────────────────
const CreateMatchScreen=({user,onBack,onCreate})=>{
  const userTier=getTier(user.rating);
  const userLoc=LOCATIONS.find(l=>l.id===user.locationId)||LOCATIONS[1];
  const[form,setForm]=useState({title:"",date:"",time:"",venue:"",address:"",notes:"",maxPlayers:"4",mode:"friendly",tierIds:[userTier.id],locationId:user.locationId||LOCATIONS[1].id});
  const[step,setStep]=useState(1);
  const[submitting,setSubmitting]=useState(false);
  const update=(k,v)=>setForm(f=>({...f,[k]:v}));
  const toggleTier=(tid)=>setForm(f=>{const a=f.tierIds.includes(tid);if(a&&f.tierIds.length===1)return f;return{...f,tierIds:a?f.tierIds.filter(x=>x!==tid):[...f.tierIds,tid]};});
  const canNext1=form.title&&form.date&&form.time&&form.tierIds.length>0;
  const canNext2=form.venue;
  const submit=async()=>{
    setSubmitting(true);
    await new Promise(r=>setTimeout(r,500));
    const m={id:"m"+Date.now(),tierIds:form.tierIds,locationId:form.locationId,title:form.title,date:form.date,time:form.time,venue:form.venue,address:form.address||"Address TBD",notes:form.notes,mode:form.mode,createdBy:user.name,creatorRating:user.rating,players:[user.name],playerRatings:{[user.name]:user.rating},maxPlayers:parseInt(form.maxPlayers),status:"open",joinRequests:[],createdAt:Date.now()};
    setSubmitting(false);onCreate(m);
  };
  const selectedLoc=LOCATIONS.find(l=>l.id===form.locationId)||LOCATIONS[1];
  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:"100dvh"}}>
      <div style={{background:T.court,paddingTop:"max(env(safe-area-inset-top, 14px), 14px)",paddingBottom:20,paddingLeft:16,paddingRight:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <button onClick={step>1?()=>setStep(s=>s-1):onBack} style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,0.1)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"white"}}><BackIcon/></button>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,color:"white"}}>Create a match</div>
        </div>
        <div style={{background:"rgba(255,255,255,0.15)",borderRadius:4,height:4,overflow:"hidden"}}><div style={{background:T.lime,height:"100%",width:`${(step/3)*100}%`,transition:"width 0.3s ease",borderRadius:4}}/></div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>{["Details","Venue","Review"].map((l,i)=><div key={i} style={{fontSize:11,color:i+1<=step?T.lime:"rgba(255,255,255,0.35)",fontWeight:i+1<=step?700:400}}>{l}</div>)}</div>
      </div>
      <div style={{flex:1,padding:20,display:"flex",flexDirection:"column",gap:16,overflowY:"auto"}}>
        {step===1&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:18}}>Match details</div>
            <Input label="Match title" value={form.title} onChange={v=>update("title",v)} placeholder="e.g. Saturday Doubles" required/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <Input label="Date" type="date" value={form.date} onChange={v=>update("date",v)} required min={new Date().toISOString().split("T")[0]}/>
              <Input label="Time" type="time" value={form.time} onChange={v=>update("time",v)} required/>
            </div>
            {/* Tiers */}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <div><label style={{fontSize:12,fontWeight:600,color:T.courtMid}}>Open to which tiers? <span style={{color:T.danger}}>*</span></label><div style={{fontSize:11,color:T.muted,marginTop:2}}>Your tier or lower only</div></div>
              {TIERS.map((t,ti)=>{const sel=form.tierIds.includes(t.id);const above=ti>TIERS.findIndex(x=>x.id===userTier.id);return(
                <button key={t.id} onClick={()=>!above&&toggleTier(t.id)} disabled={above} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 13px",borderRadius:12,cursor:above?"not-allowed":"pointer",opacity:above?0.38:1,background:sel?T.courtMid:T.surface,border:sel?`2px solid ${T.limeDim}`:`1px solid ${T.borderMed}`,textAlign:"left",transition:"all 0.15s"}}>
                  <div style={{width:32,height:32,borderRadius:8,background:sel?"rgba(200,241,53,0.15)":t.color,color:sel?T.lime:t.tc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,flexShrink:0}}>{above?<LockIcon size={12}/>:t.abbr}</div>
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:sel?"white":T.text}}>{t.label}{t.id===userTier.id&&<span style={{fontSize:10,marginLeft:6,background:sel?"rgba(200,241,53,0.2)":"#edfbc2",color:sel?T.lime:T.limeText,borderRadius:10,padding:"1px 6px"}}>Your tier</span>}{above&&<span style={{fontSize:10,marginLeft:6,color:T.muted}}>Above your level</span>}</div><div style={{fontSize:11,color:sel?"rgba(255,255,255,0.55)":T.muted}}>{t.range}</div></div>
                  {above?<LockIcon size={14}/>:<div style={{width:20,height:20,borderRadius:6,background:sel?T.lime:"transparent",border:sel?"none":`1.5px solid ${T.borderMed}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{sel&&<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={T.courtMid} strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}</div>}
                </button>
              );})}
            </div>
            {/* Players */}
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <label style={{fontSize:12,fontWeight:600,color:T.courtMid}}>Players needed</label>
              <div style={{display:"flex",gap:8}}>{["2","3","4"].map(n=><button key={n} onClick={()=>update("maxPlayers",n)} style={{flex:1,padding:"10px",borderRadius:10,background:form.maxPlayers===n?T.courtMid:T.surface,color:form.maxPlayers===n?T.lime:T.text,border:form.maxPlayers===n?"none":`1px solid ${T.borderMed}`,fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:15,cursor:"pointer"}}>{n}</button>)}</div>
            </div>
            {/* Mode */}
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <label style={{fontSize:12,fontWeight:600,color:T.courtMid}}>Match type</label>
              <div style={{display:"flex",gap:8}}>{[{id:"friendly",icon:"🤝",label:"Friendly",desc:"Casual, for fun"},{id:"competitive",icon:"⚔",label:"Competitive",desc:"Scores tracked"}].map(m=>{const a=form.mode===m.id;return<button key={m.id} onClick={()=>update("mode",m.id)} style={{flex:1,padding:"11px 10px",borderRadius:12,cursor:"pointer",background:a?(m.id==="competitive"?"#fff0f0":"#f0fdf4"):T.surface,border:a?`2px solid ${m.id==="competitive"?"#fca5a5":"#86efac"}`:`1px solid ${T.borderMed}`,textAlign:"left"}}><div style={{fontSize:18,marginBottom:3}}>{m.icon}</div><div style={{fontSize:13,fontWeight:700,color:a?(m.id==="competitive"?"#b91c1c":"#15803d"):T.text}}>{m.label}</div><div style={{fontSize:11,color:T.muted}}>{m.desc}</div></button>;})}</div>
            </div>
          </div>
        )}
        {step===2&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:18}}>Venue & location</div>
            {/* Location picker */}
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <label style={{fontSize:12,fontWeight:600,color:T.courtMid}}>Match location</label>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {LOCATIONS.map(l=><button key={l.id} onClick={()=>update("locationId",l.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 13px",borderRadius:12,cursor:"pointer",background:form.locationId===l.id?T.courtMid:T.surface,border:form.locationId===l.id?`2px solid ${T.limeDim}`:`1px solid ${T.borderMed}`}}>
                  <span style={{fontSize:20}}>{l.emoji}</span>
                  <div style={{flex:1,textAlign:"left"}}><div style={{fontSize:13,fontWeight:700,color:form.locationId===l.id?"white":T.text}}>{l.label}</div><div style={{fontSize:11,color:form.locationId===l.id?"rgba(255,255,255,0.55)":T.muted}}>{l.sub}</div></div>
                  {form.locationId===l.id&&<div style={{width:20,height:20,borderRadius:"50%",background:T.lime,display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={T.courtMid} strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg></div>}
                </button>)}
              </div>
            </div>
            <Input label="Club / venue name" value={form.venue} onChange={v=>update("venue",v)} placeholder="e.g. Sportspark Padel" required/>
            <Input label="Address (optional)" value={form.address} onChange={v=>update("address",v)} placeholder="e.g. 2501 NE 8th St, Fort Lauderdale"/>
            <Textarea label="Notes (optional)" value={form.notes} onChange={v=>update("notes",v)} placeholder="Bring water, wear non-marking shoes..."/>
            <div style={{background:T.warnBg,border:"1px solid #fde68a",borderRadius:12,padding:"12px 14px",fontSize:12,color:T.warn,lineHeight:1.6}}><strong>Reminder:</strong> Players book the court on Playtomic separately.</div>
          </div>
        )}
        {step===3&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:18}}>Review & post</div>
            <div style={{background:T.card,border:`0.5px solid ${T.border}`,borderRadius:16,padding:16,display:"flex",flexDirection:"column",gap:10}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:17}}>{form.title}</div>
              <Divider/>

const CreateSquadScreen=({user,onBack,onCreate})=>{

    setSubmitting(true);await new Promise(r=>setTimeout(r,400));

      <div style={{background:T.court,paddingTop:"max(env(safe-area-inset-top, 14px), 14px)",paddingBottom:20,paddingLeft:16,paddingRight:16}}>

        <Input label="Squad name" value={form.name} onChange={v=>update("name",v)} placeholder='e.g. "Thursday Night Crew"' required/>

        <div style={{display:"flex",flexDirection:"column",gap:6}}>

          <div style={{display:"flex",flexDirection:"column",gap:6}}>{LOCATIONS.map(l=><button key={l.id} onClick={()=>update("locationId",l.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 13px",borderRadius:12,cursor:"pointer",background:form.locationId===l.id?T.courtMid:T.surface,border:form.locationId===l.id?`2px solid ${T.limeDim}`:`1px solid ${T.borderMed}`}}><span style={{fontSize:18}}>{l.emoji}</span><span style={{fontSize:13,fontWeight:700,color:form.locationId===l.id?"white":T.text}}>{l.label}</span>{form.locationId===l.id&&<div style={{marginLeft:"auto",width:18,height:18,borderRadius:"50%",background:T.lime,display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={T.courtMid} strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg></div>}</button>)}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <label style={{fontSize:12,fontWeight:600,color:T.courtMid}}>Tier(s)</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{TIERS.map(t=>{const sel=form.tierIds.includes(t.id);return<button key={t.id} onClick={()=>toggleTier(t.id)} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 12px",borderRadius:20,cursor:"pointer",background:sel?T.courtMid:T.surface,border:sel?`2px solid ${T.limeDim}`:`1px solid ${T.borderMed}`}}><div style={{width:20,height:20,borderRadius:6,background:sel?"rgba(200,241,53,0.15)":t.color,color:sel?T.lime:t.tc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:800}}>{t.abbr}</div><span style={{fontSize:12,fontWeight:700,color:sel?"white":T.text}}>{t.label}</span></button>;})}</div>

              <button key={String(s.id)} onClick={()=>setAvailStatus(s.id)} style={{flex:1,padding:"8px 6px",borderRadius:10,border:availStatus===s.id?`2px solid ${T.limeDim}`:`1px solid ${T.borderMed}`,background:availStatus===s.id?"#f6fce8":T.surface,cursor:"pointer",fontSize:10,fontWeight:availStatus===s.id?700:400,color:T.text,lineHeight:1.4,textAlign:"center"}}>{s.label}</button>
