const SquadDetailScreen=({squad,user,chats,onSend,onBack,onJoin,onLeave,onDelete})=>{
  useSwipeBack(onBack);
  const[activeTab,setActiveTab]=useState("chat");
  const[copied,setCopied]=useState(false);
  const[confirmDelete,setConfirmDelete]=useState(false);
  const loc=LOCATIONS.find(l=>l.id===squad.locationId)||LOCATIONS[1];
  const isMember=squad.members.includes(user.name);
  const isCreator=squad.createdBy===user.name;
  const chatK=`squad_${squad.id}`;
  const msgs=chats[chatK]||[];
  const[input,setInput]=useState("");
  const bottomRef=useRef();
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  const send=()=>{if(!input.trim())return;const now=new Date();onSend(chatK,{id:Date.now(),sender:"You",text:input.trim(),mine:true,time:`${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`});setInput("");};
  const tierLabels=squad.tierIds.map(id=>TIERS.find(t=>t.id===id)?.label).filter(Boolean).join(" · ");

  // Build an invite link — encodes the squad id so recipients land on the right squad
  const inviteLink = (() => {
    try {
      const base = window.location.href.split("?")[0];
      const payload = btoa(unescape(encodeURIComponent(JSON.stringify({ squadId: squad.id, squadName: squad.name }))));
      return `${base}?squad=${encodeURIComponent(payload)}`;
    } catch(e) { return window.location.href.split("?")[0]; }
  })();

  const handleShare = async () => {
    const msg = `Join my PadelRank squad "${squad.name}"! Tap the link to open the app and join: ${inviteLink}`;
    try {
      if (navigator.share) {
        await navigator.share({ title: `Join ${squad.name} on PadelRank`, text: msg, url: inviteLink });
      } else {
        await navigator.clipboard.writeText(msg);
        setCopied(true);
        setTimeout(() => setCopied(false), 2500);
      }
    } catch(e) {
      try { await navigator.clipboard.writeText(msg); setCopied(true); setTimeout(()=>setCopied(false),2500); } catch(e2) {}
    }
  };

  const tabs = isCreator
    ? [["chat","Chat"],["members","Members"],["invite","Invite"],["info","Info"]]
    : [["chat","Chat"],["members","Members"],["info","Info"]];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100dvh"}}>
      <div style={{background:T.court,paddingTop:"max(calc(env(safe-area-inset-top, 50px) + 12px), 62px)",paddingBottom:0,paddingLeft:16,paddingRight:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <button onClick={onBack} style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,0.1)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"white"}}><BackIcon/></button>
          <div style={{flex:1}}><div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:15,color:"white"}}>{squad.name}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.45)",marginTop:1}}>{loc.emoji} {loc.label} · {squad.members.length} members</div></div>
          {isCreator&&<button onClick={handleShare} style={{background:T.lime,color:T.court,border:"none",borderRadius:8,padding:"6px 11px",fontSize:11,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
            {copied?"Copied!":"Invite"}
          </button>}
          {isMember&&!isCreator&&<button onClick={()=>onLeave(squad)} style={{background:"rgba(220,38,38,0.2)",color:"#fca5a5",border:"none",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>Leave</button>}
        </div>
        <div style={{display:"flex",borderTop:"1px solid rgba(255,255,255,0.08)"}}>
          {tabs.map(([id,label])=>(
            <button key={id} onClick={()=>setActiveTab(id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"10px 0 12px",color:activeTab===id?T.lime:"rgba(255,255,255,0.45)",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:activeTab===id?700:400,borderBottom:activeTab===id?`2px solid ${T.lime}`:"2px solid transparent"}}>{label}</button>
          ))}
        </div>
      </div>
      {activeTab==="chat"&&(
        <>
          <div style={{flex:1,overflowY:"auto",padding:"12px",display:"flex",flexDirection:"column",gap:10,background:T.surface}}>
            {!isMember&&<div style={{textAlign:"center",background:"rgba(0,0,0,0.04)",borderRadius:12,padding:"10px",fontSize:12,color:T.muted,margin:"4px 0"}}>Join this squad to participate in the chat</div>}
            {msgs.length===0&&isMember&&<div style={{textAlign:"center",padding:"30px 0",fontSize:13,color:T.muted}}>No messages yet. Start the conversation!</div>}
            {msgs.map(m=>(
              <div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:m.mine?"flex-end":"flex-start",gap:3,maxWidth:"80%",alignSelf:m.mine?"flex-end":"flex-start"}}>
                {!m.mine&&<div style={{fontSize:11,color:T.muted,marginLeft:4}}>{m.sender}</div>}
                <div style={{background:m.mine?T.courtMid:T.card,color:m.mine?"white":T.text,borderRadius:m.mine?"14px 14px 4px 14px":"14px 14px 14px 4px",padding:"10px 13px",fontSize:13,lineHeight:1.5,border:m.mine?"none":`0.5px solid ${T.border}`}}>{m.text}</div>
                <div style={{fontSize:10,color:T.mutedLight}}>{m.time}</div>
              </div>
            ))}
            <div ref={bottomRef}/>
          </div>
          <div style={{padding:"10px 12px",background:T.card,borderTop:`0.5px solid ${T.border}`,display:"flex",gap:8,alignItems:"center"}}>
            {isMember?<><input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Message squad..." style={{flex:1,border:`1px solid ${T.borderMed}`,borderRadius:20,padding:"9px 14px",fontSize:13,fontFamily:"'DM Sans',sans-serif",background:T.surface,outline:"none"}}/><button onClick={send} style={{width:38,height:38,borderRadius:"50%",background:T.courtMid,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><SendIcon/></button></>:<div style={{flex:1,textAlign:"center"}}><button onClick={()=>onJoin(squad)} style={{background:T.courtMid,color:T.lime,border:"none",borderRadius:12,padding:"10px 24px",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer"}}>Join squad to chat</button></div>}
          </div>
        </>
      )}
      {activeTab==="members"&&(
        <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:8}}>
          {squad.members.map((name,i)=>(
            <div key={name} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:T.surface,borderRadius:12}}>
              <Avatar initials={name.split(" ").map(w=>w[0]).join("").substring(0,2)} size={38}/>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{name}</div><div style={{fontSize:11,color:T.muted}}>{i===0?"Squad owner":"Member"}</div></div>
              {name===user.name&&<Pill variant="lime">You</Pill>}
            </div>
          ))}
          {!isMember&&<div style={{paddingTop:8}}><Btn variant="dark" size="lg" full onClick={()=>onJoin(squad)}>Join this squad</Btn></div>}
          {isCreator&&(
            <div style={{marginTop:8,background:"#f0fdf4",border:"1px solid #86efac",borderRadius:12,padding:"12px 14px"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#16a34a",marginBottom:4}}>📣 Growing your squad?</div>
              <div style={{fontSize:12,color:"#15803d",lineHeight:1.6,marginBottom:10}}>Tap the <strong>Invite</strong> tab above to get a shareable link you can send via WhatsApp, iMessage, or any app.</div>
              <Btn variant="dark" size="sm" full onClick={()=>setActiveTab("invite")}>Go to Invite →</Btn>
            </div>
          )}
        </div>
      )}
      {activeTab==="invite"&&isCreator&&(
        <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:14}}>
          {/* Big share CTA */}
          <div style={{background:T.court,borderRadius:16,padding:20,textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:8}}>👥</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:18,color:"white",marginBottom:6}}>Invite players to join</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.6)",lineHeight:1.6,marginBottom:16}}>Share this link and anyone who taps it will be taken straight to your squad.</div>
            <button onClick={handleShare} style={{width:"100%",background:T.lime,color:T.court,border:"none",borderRadius:12,padding:"14px",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
              {copied ? "✓ Copied to clipboard!" : "Share invite link"}
            </button>
          </div>

          {/* Link preview */}
          <div style={{background:T.card,border:`0.5px solid ${T.border}`,borderRadius:12,padding:14}}>
            <div style={{fontSize:11,color:T.muted,fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>Invite link</div>
            <div style={{fontSize:11,color:T.text,wordBreak:"break-all",fontFamily:"monospace",background:T.surface,borderRadius:8,padding:"8px 10px",lineHeight:1.5}}>{inviteLink}</div>
            <button onClick={handleShare} style={{marginTop:8,width:"100%",background:"none",border:`1px solid ${T.borderMed}`,borderRadius:8,padding:"8px",fontSize:12,fontWeight:600,color:T.text,cursor:"pointer"}}>
              {copied ? "✓ Copied!" : "📋 Copy link"}
            </button>
          </div>

          {/* How it works */}
          <div style={{background:T.card,border:`0.5px solid ${T.border}`,borderRadius:12,padding:14,display:"flex",flexDirection:"column",gap:10}}>
            <div style={{fontSize:12,fontWeight:700,color:T.text}}>How it works</div>
            {[
              ["1","Share the link via WhatsApp, iMessage, or copy it"],
              ["2","Your friend taps it and opens PadelRank"],
              ["3","They land directly on your squad and can join instantly"],
            ].map(([n,txt])=>(
              <div key={n} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:T.lime,color:T.court,fontSize:11,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{n}</div>
                <div style={{fontSize:12,color:T.muted,lineHeight:1.5,paddingTop:3}}>{txt}</div>
              </div>
            ))}
          </div>

          {/* Current members count */}
          <div style={{textAlign:"center",fontSize:12,color:T.muted}}>
            {squad.members.length} member{squad.members.length!==1?"s":""} so far · {squad.members.length < 4 ? `Room for ${4-squad.members.length} more` : "Squad is full!"}
          </div>
        </div>
      )}
      {activeTab==="info"&&(
        <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12}}>
          <div style={{background:T.card,border:`0.5px solid ${T.border}`,borderRadius:14,padding:14}}>
            {[{l:"Squad name",v:squad.name},{l:"Location",v:`${loc.emoji} ${loc.label}`},{l:"Tiers",v:tierLabels},{l:"Privacy",v:squad.isPrivate===false?"🌐 Public":"🔒 Private"},{l:"Members",v:`${squad.members.length} players`},{l:"Created by",v:squad.createdBy},{l:"Created",v:timeAgoStr(squad.createdAt)}].map((row,i,arr)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:i<arr.length-1?`0.5px solid ${T.border}`:"none",fontSize:13}}><span style={{color:T.muted}}>{row.l}</span><span style={{fontWeight:500}}>{row.v}</span></div>
            ))}
          </div>
          <div style={{background:T.surface,borderRadius:12,padding:"12px 14px"}}><div style={{fontSize:13,color:T.muted,lineHeight:1.6}}>{squad.description}</div></div>
          {!isMember&&<Btn variant="dark" size="lg" full onClick={()=>onJoin(squad)}>Join this squad</Btn>}
          {isMember&&!isCreator&&<Btn variant="danger" size="sm" full onClick={()=>onLeave(squad)}>Leave squad</Btn>}

          {/* Delete squad — creator only */}
          {isCreator&&(
            <div style={{marginTop:8}}>
              {!confirmDelete?(
                <button onClick={()=>setConfirmDelete(true)}
                  style={{width:"100%",background:"none",border:`1.5px solid rgba(220,38,38,0.35)`,borderRadius:12,padding:"11px",fontSize:13,fontWeight:600,color:"#ef4444",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                  Delete squad permanently
                </button>
              ):(
                <div style={{background:"rgba(220,38,38,0.08)",border:"1.5px solid rgba(220,38,38,0.35)",borderRadius:14,padding:16,display:"flex",flexDirection:"column",gap:12}}>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:28,marginBottom:6}}>⚠️</div>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,color:"#ef4444",marginBottom:4}}>Delete "{squad.name}"?</div>
                    <div style={{fontSize:12,color:T.muted,lineHeight:1.6}}>This will permanently erase the squad, all its members, and the entire chat history. This cannot be undone.</div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>setConfirmDelete(false)}
                      style={{flex:1,background:T.card,border:`1px solid ${T.borderMed}`,borderRadius:10,padding:"10px",fontSize:13,fontWeight:600,color:T.text,cursor:"pointer"}}>
                      Cancel
                    </button>
                    <button onClick={()=>onDelete(squad)}
                      style={{flex:1,background:"#ef4444",border:"none",borderRadius:10,padding:"10px",fontSize:13,fontWeight:700,color:"white",cursor:"pointer"}}>
                      Yes, delete it
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
};

// ─── Create Squad Screen ──────────────────────────────────────────────────────
const CreateSquadScreen=({user,onBack,onCreate})=>{
  useSwipeBack(onBack);
  const userTier=getTier(user.rating);
  const[form,setForm]=useState({name:"",description:"",locationId:user.locationId||LOCATIONS[1].id,tierIds:[userTier.id],isPrivate:true});
  const[submitting,setSubmitting]=useState(false);
  const update=(k,v)=>setForm(f=>({...f,[k]:v}));
  const toggleTier=(tid)=>setForm(f=>{const a=f.tierIds.includes(tid);if(a&&f.tierIds.length===1)return f;return{...f,tierIds:a?f.tierIds.filter(x=>x!==tid):[...f.tierIds,tid]};});
  const submit=async()=>{
    setSubmitting(true);await new Promise(r=>setTimeout(r,400));
    const sq={id:"sq"+Date.now(),name:form.name,description:form.description,locationId:form.locationId,tierIds:form.tierIds,isPrivate:form.isPrivate,members:[user.name],createdBy:user.name,createdAt:Date.now()};
    setSubmitting(false);onCreate(sq);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:"100dvh"}}>
      <div style={{background:T.court,paddingTop:"max(calc(env(safe-area-inset-top, 50px) + 12px), 62px)",paddingBottom:20,paddingLeft:16,paddingRight:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><button onClick={onBack} style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,0.1)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"white"}}><BackIcon/></button><div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,color:"white"}}>Create a squad</div></div>
      </div>
      <div style={{flex:1,padding:20,display:"flex",flexDirection:"column",gap:16,overflowY:"auto"}}>
        <Input label="Squad name" value={form.name} onChange={v=>update("name",v)} placeholder='e.g. "Thursday Night Crew"' required/>
        <Textarea label="Description" value={form.description} onChange={v=>update("description",v)} placeholder="What's this squad about? When do you usually play?" rows={2}/>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <label style={{fontSize:12,fontWeight:600,color:T.courtMid}}>Location</label>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>{LOCATIONS.map(l=><button key={l.id} onClick={()=>update("locationId",l.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 13px",borderRadius:12,cursor:"pointer",background:form.locationId===l.id?T.courtMid:T.surface,border:form.locationId===l.id?`2px solid ${T.limeDim}`:`1px solid ${T.borderMed}`}}><span style={{fontSize:18}}>{l.emoji}</span><span style={{fontSize:13,fontWeight:700,color:form.locationId===l.id?"white":T.text}}>{l.label}</span>{form.locationId===l.id&&<div style={{marginLeft:"auto",width:18,height:18,borderRadius:"50%",background:T.lime,display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={T.courtMid} strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg></div>}</button>)}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <label style={{fontSize:12,fontWeight:600,color:T.courtMid}}>Tier(s)</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{TIERS.map(t=>{const sel=form.tierIds.includes(t.id);return<button key={t.id} onClick={()=>toggleTier(t.id)} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 12px",borderRadius:20,cursor:"pointer",background:sel?T.courtMid:T.surface,border:sel?`2px solid ${T.limeDim}`:`1px solid ${T.borderMed}`}}><div style={{width:20,height:20,borderRadius:6,background:sel?"rgba(200,241,53,0.15)":t.color,color:sel?T.lime:t.tc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:800}}>{t.abbr}</div><span style={{fontSize:12,fontWeight:700,color:sel?"white":T.text}}>{t.label}</span></button>;})}</div>
        </div>
        <div style={{flex:1}}/>

        {/* Privacy toggle */}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <label style={{fontSize:12,fontWeight:600,color:T.courtMid}}>Privacy</label>
          <div style={{display:"flex",gap:8}}>
            {[
              { val:true,  icon:"🔒", label:"Private", sub:"Invite only" },
              { val:false, icon:"🌐", label:"Public",  sub:"Anyone can join" },
            ].map(opt=>{
              const sel = form.isPrivate === opt.val;
              return (
                <button key={String(opt.val)} onClick={()=>update("isPrivate", opt.val)}
                  style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"12px 8px",borderRadius:14,cursor:"pointer",
                    background:sel?T.courtMid:T.surface,
                    border:sel?`2px solid ${T.lime}`:`1.5px solid ${T.borderMed}`,
                    transition:"all 0.15s"}}>
                  <div style={{fontSize:22}}>{opt.icon}</div>
                  <div style={{fontSize:13,fontWeight:700,color:sel?"white":T.text}}>{opt.label}</div>
                  <div style={{fontSize:10,color:sel?"rgba(255,255,255,0.55)":T.muted}}>{opt.sub}</div>
                  {sel&&<div style={{width:18,height:18,borderRadius:"50%",background:T.lime,display:"flex",alignItems:"center",justifyContent:"center",marginTop:2}}>
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={T.court} strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
                  </div>}
                </button>
              );
            })}
          </div>
          {/* Context hint updates based on selection */}
          <div style={{fontSize:12,color:T.muted,background:T.card,borderRadius:10,padding:"9px 12px",border:`0.5px solid ${T.border}`,lineHeight:1.5}}>
            {form.isPrivate
              ? "🔒 Only players you share the invite link with can find and join this squad."
              : "🌐 Your squad will be visible to all nearby players who can join without an invite."}
          </div>
        </div>

        <Btn variant="dark" size="lg" full disabled={!form.name||submitting} onClick={submit}>{submitting?"Creating...":"Create squad"}</Btn>
      </div>
    </div>
  );
};


// ─── Profile Tab ──────────────────────────────────────────────────────────────
const ProfileTab=({user,matches,squads,onReVerify,onChangeLocation,onSignOut})=>{
  const userTier=getTier(user.rating);
  const userLoc=LOCATIONS.find(l=>l.id===user.locationId)||LOCATIONS[1];
  const myMatches=matches.filter(m=>m.players.includes(user.name));
  const myCreated=matches.filter(m=>m.createdBy===user.name);
  const mySquads=squads.filter(s=>s.members.includes(user.name));
  const[availStatus,setAvailStatus]=useState(null); // null | "today" | "weekend"
  return(
    <div style={{flex:1,overflow:"auto"}}>
      <div style={{background:T.court,paddingTop:"max(calc(env(safe-area-inset-top, 50px) + 12px), 62px)",paddingBottom:28,paddingLeft:20,paddingRight:20,textAlign:"center"}}>
        <Avatar initials={user.initials} size={72} bg={T.lime} color={T.courtMid}/>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,color:"white",marginTop:12}}>{user.name}</div>
        <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(200,241,53,0.15)",color:T.lime,borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:600,marginTop:6}}><CheckIcon/> Rating {user.rating.toFixed(1)} — Verified</div>
        <div style={{marginTop:8}}><Badge label={`${userTier.label} · ${userTier.range}`} bg={userTier.color} color={userTier.tc} size={12}/></div>
        <div style={{marginTop:6,fontSize:12,color:"rgba(255,255,255,0.5)"}}>{userLoc.emoji} {userLoc.label}</div>
      </div>

      {/* Looking to play status */}
      <div style={{padding:"16px 16px 0"}}>
        <div style={{background:T.card,border:`0.5px solid ${T.border}`,borderRadius:14,padding:14,marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:T.courtMid,marginBottom:10}}>Looking to play?</div>
          <div style={{display:"flex",gap:8}}>
            {[{id:"today",label:"🟢 Available today"},{id:"weekend",label:"📅 Available weekend"},{id:null,label:"⚫ Not available"}].map(s=>(
              <button key={String(s.id)} onClick={()=>setAvailStatus(s.id)} style={{flex:1,padding:"8px 6px",borderRadius:10,border:availStatus===s.id?`2px solid ${T.limeDim}`:`1px solid ${T.borderMed}`,background:availStatus===s.id?"#f6fce8":T.surface,cursor:"pointer",fontSize:10,fontWeight:availStatus===s.id?700:400,color:T.text,lineHeight:1.4,textAlign:"center"}}>{s.label}</button>
            ))}
          </div>
          {availStatus&&<div style={{marginTop:10,padding:"8px 12px",background:T.successBg,borderRadius:9,fontSize:12,color:T.success,fontWeight:500}}>✓ You're shown as available to nearby {userTier.label} players in {userLoc.label}</div>}
        </div>
      </div>

      <div style={{padding:"0 16px 16px",display:"flex",flexDirection:"column",gap:12}}>
        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
          {[{label:"Matches",val:myMatches.length},{label:"Created",val:myCreated.length},{label:"Squads",val:mySquads.length},{label:"Rating",val:user.rating.toFixed(1)}].map((s,i)=>(
            <div key={i} style={{background:T.surface,borderRadius:12,padding:"10px 6px",textAlign:"center"}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,color:T.courtMid}}>{s.val}</div>
              <div style={{fontSize:9,color:T.muted,marginTop:2}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Account */}
        <div style={{background:T.card,border:`0.5px solid ${T.border}`,borderRadius:16,padding:16}}>

// ─── Email config ─────────────────────────────────────────────────────────────
// Step 1: Go to emailjs.com → sign up free
// Step 2: Add Email Service (Gmail) → copy Service ID below
// Step 3: Create Email Template → copy Template ID below
// Step 4: Account → General → copy Public Key below
const EMAILJS_SERVICE_ID  = "service_rjsaq0r";
const EMAILJS_TEMPLATE_ID = "template_wp9irbf";
const EMAILJS_PUBLIC_KEY  = "DP1RXQboEJ0a2xJVh";

// Template variables you can use in your EmailJS template:
// {{to_name}}    - player's name
// {{to_email}}   - player's email
// {{status}}     - "approved" or "rejected"
// {{rating}}     - their rating number e.g. "5.8"
// {{tier}}       - tier name e.g. "Advanced"
// {{admin_note}} - your note to them
// {{app_url}}    - link back to the app

const EMAIL_CONFIGURED = (
  EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY" &&
  EMAILJS_SERVICE_ID !== "YOUR_SERVICE_ID" &&
  EMAILJS_TEMPLATE_ID !== "YOUR_TEMPLATE_ID"
);

async function sendNotificationEmail({toEmail, toName, subject, status, adminNote, rating, tier}) {
  if (!EMAIL_CONFIGURED) {
    console.warn("EmailJS not configured — skipping email. Fill in SERVICE_ID, TEMPLATE_ID, PUBLIC_KEY above.");
    return false;
  }
  if (!window.emailjs) {
    console.error("EmailJS SDK not loaded.");
    return false;
  }
  // Build the magic login link — encode user data directly in URL so it works cross-device
  // No database lookup needed on player's device — all info is in the link itself
  const loginLink = (() => {
    const base = window.location.href.split("?")[0];
    const payload = {
      name: toName,
      email: toEmail,
      rating: rating != null ? parseFloat(rating) : 5.0,
      tier: tier || "intermediate",
      status: "approved",
      approvedAt: Date.now(),
    };
    try {
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
      return `${base}?token=${encodeURIComponent(encoded)}`;
    } catch(e) {
      return `${base}?login=${encodeURIComponent(toEmail)}`;
    }
  })();
  try {
    const result = await window.emailjs.send(
      EMAILJS_SERVICE_ID,
      EMAILJS_TEMPLATE_ID,
      {
        to_name:    toName || "Player",
        to_email:   toEmail,
        subject:    subject,
        status:     status,
        rating:     rating != null ? parseFloat(rating).toFixed(1) : "—",
        tier:       tier || "—",
        admin_note: adminNote || "",
        app_url:    window.location.href.split("?")[0],
        login_link: loginLink,
      }
    );
    console.log("EmailJS sent OK:", result.status, result.text);
    return true;
  } catch(e) {
    console.error("EmailJS send failed:", e?.text || e?.message || e);
    return false;
  }
}

              {selected.email && <a href={`mailto:${selected.email}?subject=PadelRank%20Application&body=Hi%20${encodeURIComponent(selected.name)}%2C%0A%0A${encodeURIComponent(adminNote||"")}`} style={{background:T.danger,color:"white",borderRadius:8,padding:"8px 14px",fontSize:12,fontFamily:"'Syne',sans-serif",fontWeight:700,textDecoration:"none",display:"inline-block"}}>📧 Email {selected.email}</a>}
              {selected.phone && <div style={{fontSize:12,color:T.danger}}>📞 {selected.phone}</div>}
            </div>
          )}
          {emailStatus === "no-config" && (
            <div style={{background:T.warnBg,border:"1px solid #fde68a",borderRadius:12,padding:"12px 14px",display:"flex",flexDirection:"column",gap:8}}>
              <div style={{fontSize:12,color:T.warn,fontWeight:600}}>📧 EmailJS not set up yet — tap to contact manually:</div>
              {selected.email && <a href={`mailto:${selected.email}?subject=PadelRank%20Application%20Update&body=Hi%20${encodeURIComponent(selected.name)}%2C%0A%0AYour%20PadelRank%20application%20has%20been%20reviewed.%0A%0A${encodeURIComponent(adminNote||"")}`} style={{background:T.warn,color:"white",borderRadius:8,padding:"8px 14px",fontSize:12,fontFamily:"'Syne',sans-serif",fontWeight:700,textDecoration:"none",display:"inline-block"}}>📧 Tap to email {selected.email}</a>}
              {selected.phone && <div style={{fontSize:12,color:T.warn}}>📞 {selected.phone}</div>}
            </div>
          )}

          {/* Action area */}
          {selected.status === "pending" ? (
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                <label style={{fontSize:12,fontWeight:600,color:T.courtMid}}>Note to player (included in notification email)</label>
                <textarea value={adminNote} onChange={e=>setAdminNote(e.target.value)}
                  placeholder="e.g. Welcome! Confirmed your rating on Playtomic. You're approved!"
                  rows={3}
                  style={{border:`1px solid ${T.borderMed}`,borderRadius:10,padding:"10px 13px",fontSize:13,fontFamily:"'DM Sans',sans-serif",resize:"none",background:T.card,color:T.text,outline:"none",width:"100%",boxSizing:"border-box"}}
                />
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>handleDecision(selected,false)} disabled={processing}
                  style={{flex:1,background:T.dangerBg,color:T.danger,border:"1px solid #fca5a5",borderRadius:12,padding:"14px",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,cursor:processing?"not-allowed":"pointer",opacity:processing?0.6:1,minHeight:48}}>
                  {processing?"Processing...":"✕ Reject"}
                </button>
                <button onClick={()=>handleDecision(selected,true)} disabled={processing}
                  style={{flex:1,background:T.courtMid,color:T.lime,border:"none",borderRadius:12,padding:"14px",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,cursor:processing?"not-allowed":"pointer",opacity:processing?0.6:1,minHeight:48}}>
                  {processing?"Processing...":"✓ Approve"}
                </button>
              </div>
              {processing && emailStatus === "sending" && (
                <div style={{textAlign:"center",fontSize:12,color:T.muted}}>Sending notification email...</div>
              )}
              <div style={{background:T.surface,borderRadius:10,padding:"10px 12px",fontSize:11,color:T.muted,lineHeight:1.6}}>
                {selected.email ? `📧 Notification will be emailed to ${selected.email}` : "⚠️ No email on file — contact by phone: " + (selected.phone||"—")}
              </div>
            </div>
          ) : (
            <div style={{background:selected.status==="approved"?T.successBg:T.dangerBg,border:`1px solid ${selected.status==="approved"?"#86efac":"#fca5a5"}`,borderRadius:12,padding:"14px",textAlign:"center"}}>
              <div style={{fontSize:15,fontWeight:700,color:selected.status==="approved"?T.success:T.danger,marginBottom:4}}>
                {selected.status==="approved"?"✓ Approved":"✕ Rejected"}
              </div>
              {selected.adminNote && <div style={{fontSize:12,color:selected.status==="approved"?T.success:T.danger,opacity:0.8}}>{selected.adminNote}</div>}
              {selected.reviewedAt && <div style={{fontSize:11,color:T.muted,marginTop:6}}>{new Date(selected.reviewedAt).toLocaleString()}</div>}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── Application list view ──────────────────────────────────────────────────
  return (
    <div style={{display:"flex",flexDirection:"column",height:"100dvh",background:T.surface}}>
      <div style={{background:T.court,paddingTop:"max(calc(env(safe-area-inset-top, 50px) + 12px), 62px)",paddingBottom:0,paddingLeft:16,paddingRight:16,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <button onClick={onBack} style={{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,0.1)",border:"none",display:"flex",alignItems:"center",justifyContent:"center",color:"white",cursor:"pointer"}}><BackIcon/></button>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:16,color:"white"}}>Admin dashboard</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.45)"}}>PadelRank — player applications</div>
          </div>
          {pendingCount > 0 && (
            <div style={{background:"#ef4444",color:"white",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:12,borderRadius:20,padding:"4px 12px"}}>{pendingCount} pending</div>
          )}
        </div>

        {/* Refresh button */}
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
          <button onClick={()=>setRefreshKey(k=>k+1)} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"rgba(255,255,255,0.7)",borderRadius:8,padding:"5px 12px",fontSize:11,fontFamily:"'DM Sans',sans-serif",cursor:"pointer"}}>
            ↻ Refresh
          </button>
        </div>

        {/* Filter tabs */}
        <div style={{display:"flex",borderTop:"1px solid rgba(255,255,255,0.08)"}}>
          {[["pending","Pending",pendingCount],["approved","Approved",null],["rejected","Rejected",null],["all","All",apps.length]].map(([id,label,count])=>(
            <button key={id} onClick={()=>setFilter(id)}
              style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"10px 0 12px",color:filter===id?T.lime:"rgba(255,255,255,0.45)",fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:filter===id?700:400,borderBottom:filter===id?`2px solid ${T.lime}`:"2px solid transparent"}}>
              {label}{count!=null&&count>0?` (${count})`:""}
            </button>
          ))}
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"14px 14px 24px"}}>
        {loading ? (
          <div style={{textAlign:"center",padding:"60px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
            <div style={{width:32,height:32,border:"3px solid rgba(0,0,0,0.1)",borderTopColor:T.courtMid,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
            <div style={{fontSize:13,color:T.muted}}>Loading applications...</div>
          </div>
        ) : filtered.length === 0 ? (
          <div style={{textAlign:"center",padding:"60px 16px"}}>
            <div style={{fontSize:48,marginBottom:14}}>📋</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:16,marginBottom:8}}>
              {filter==="pending" ? "No pending applications" : filter==="all" ? "No applications yet" : `No ${filter} applications`}
            </div>
            <div style={{fontSize:13,color:T.muted,lineHeight:1.6}}>
              {filter==="all" ? "New player applications will appear here when they sign up via the app." : `Applications that are ${filter} will show here.`}
            </div>
            <button onClick={()=>setRefreshKey(k=>k+1)} style={{marginTop:20,background:T.courtMid,color:T.lime,border:"none",borderRadius:12,padding:"10px 22px",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer"}}>↻ Refresh</button>
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {filtered.map(app => {
              const t = getTier(app.rating || 5);
              return (
                <button key={app.id} onClick={()=>setSelected(app)}
                  style={{background:T.card,border:`1px solid ${app.status==="pending"?"#fde68a":T.border}`,borderRadius:14,padding:"14px",textAlign:"left",cursor:"pointer",width:"100%",display:"block"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:46,height:46,borderRadius:12,background:t.color,color:t.tc,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,flexShrink:0}}>
                      {(app.name||"?").split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase()}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                        <span style={{fontWeight:700,fontSize:15,color:T.text}}>{app.name}</span>
                        <span style={{background:app.status==="pending"?T.warnBg:app.status==="approved"?T.successBg:T.dangerBg,color:app.status==="pending"?T.warn:app.status==="approved"?T.success:T.danger,fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:20}}>
                          {app.status==="pending"?"⏳ Pending":app.status==="approved"?"✓ Approved":"✕ Rejected"}
                        </span>
                      </div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:4}}>
                        <span style={{background:t.color,color:t.tc,fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20}}>{t.label}</span>
                        <span style={{background:T.surface,color:T.muted,fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20}}>⭐ {app.rating?.toFixed(1)}</span>
                        {app.screenshotBase64 && <span style={{background:"#f0fdf4",color:T.success,fontSize:10,padding:"2px 8px",borderRadius:20}}>📸 screenshot</span>}
                        {app.playtomicUrl && <span style={{background:"#eff6ff",color:T.info,fontSize:10,padding:"2px 8px",borderRadius:20}}>🔗 profile link</span>}
                      </div>
                      <div style={{fontSize:11,color:T.muted}}>
                        {app.email||""}{app.email&&app.phone?" · ":""}{app.phone||""}
                      </div>
                      {app.submittedAt && <div style={{fontSize:10,color:T.mutedLight,marginTop:2}}>{timeAgoStr(app.submittedAt)}</div>}
                    </div>
                    <div style={{color:T.muted,fontSize:18,flexShrink:0}}>›</div>
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}


// ─── Root App ─────────────────────────────────────────────────────────────────
// ─── localStorage persistence helpers ────────────────────────────────────────
const LS = {
  get(key, fallback) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch(e) { return fallback; }
  },
  set(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify(value));
    } catch(e) {
      if (e.name === "QuotaExceededError") {
        // Storage full — clear old chat history to free space, keep user+matches+squads
        try {
          localStorage.removeItem("pr_chats");
          localStorage.setItem(key, JSON.stringify(value));
        } catch(_) { console.warn("localStorage full, could not save:", key); }
      }
    }
  },
};

function PadelRankApp() {
  // ── Decode ?token= from URL (email login link) ───────────────────────────
  const _deepLinkData = (() => {
    try {
      const p = new URLSearchParams(window.location.search);
      if (p.get("token")) return AUTH.decodeToken(p.get("token"));
      return null;
    } catch(e) { return null; }
  })();

  // Decode ?squad= invite link — stores the squad id to auto-open after load
  const _squadInviteId = (() => {
    try {
      const p = new URLSearchParams(window.location.search);
      if (p.get("squad")) {
        const decoded = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(p.get("squad"))))));
        return decoded?.squadId || null;
      }
    } catch(e) {}
    return null;
  })();

  // ── Restore all state — cookies bridge Safari ↔ PWA ─────────────────────
  const[screen,setScreen]=useState(()=>{
    // Priority 1: valid token in URL → log in immediately
    if (_deepLinkData) return "deepLinkLogin";
    // Priority 2: already logged in (cookie OR localStorage — both checked)
    const u = AUTH.load();
    if (u) return "main";
    // Priority 3: pending application saved
    const pending = LS.get("pr_pending_app", null);
    if (pending) return "pendingApproval";
    return "onboard";
  });
  const[user,setUser]=useState(()=>{
    if (_deepLinkData) return null; // will be set by loginApprovedUser
    return AUTH.load();
  });
  const[activeTab,setActiveTab]=useState(()=>LS.get("pr_activeTab","chats"));
  const[matches,setMatches]=useState(()=>LS.get("pr_matches", SEED_MATCHES));
  const[squads,setSquads]=useState(()=>LS.get("pr_squads", SEED_SQUADS));
  const[chats,setChats]=useState(()=>LS.get("pr_chats", buildSeedChats()));
  const[selectedMatch,setSelectedMatch]=useState(null);
  const[selectedSquad,setSelectedSquad]=useState(null);
  const[newMatch,setNewMatch]=useState(null);
  const[activeChatTier,setActiveChatTier]=useState(null);
  const[activeChatLoc,setActiveChatLoc]=useState(null);
  const[activeMatchChat,setActiveMatchChat]=useState(null); // match object for private match chat
  const[adminAuthed,setAdminAuthed]=useState(false);
  const[prefilledVenue,setPrefilledVenue]=useState(null);

  // ── Persist state to localStorage whenever it changes ─────────────────────
  useEffect(()=>{ if(user) AUTH.save(user); }, [user]);
  useEffect(()=>{ LS.set("pr_activeTab", activeTab); }, [activeTab]);
  useEffect(()=>{ LS.set("pr_matches", matches); }, [matches]);
  useEffect(()=>{ LS.set("pr_squads", squads); }, [squads]);
  useEffect(()=>{ LS.set("pr_chats", chats); }, [chats]);

  // ── Load fonts ────────────────────────────────────────────────────────────
  useEffect(()=>{
    const link=document.createElement("link");
    link.rel="stylesheet";link.href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap";
    document.head.appendChild(link);
  },[]);

  // ── Deep link auto-login ──────────────────────────────────────────────────
  useEffect(()=>{
    if (screen !== "deepLinkLogin" || !_deepLinkData) return;
    // Clean the URL immediately so refresh doesn't re-trigger
    try { window.history.replaceState({}, "", window.location.pathname); } catch(e) {}
    // The token contains everything we need — no localStorage lookup required
    loginApprovedUser(_deepLinkData);
  }, [screen]);

  // ── Squad invite deep link — auto-open squad after user is logged in ───────
  useEffect(()=>{
    if (!_squadInviteId || screen !== "main" || !user) return;
    // Clean URL so refresh doesn't re-trigger
    try { window.history.replaceState({}, "", window.location.pathname); } catch(e) {}
    const target = squads.find(s => s.id === _squadInviteId);
    if (target) {
      // Mark this squad as invite-authorised for this session
      const invitedKey = "pr_squad_invites";
      try {
        const existing = JSON.parse(localStorage.getItem(invitedKey)||"[]");
        if (!existing.includes(_squadInviteId)) {
          localStorage.setItem(invitedKey, JSON.stringify([...existing, _squadInviteId]));
        }
      } catch(e) {}
      setSelectedSquad(target.id);
      setScreen("squadDetail");
      setActiveTab("squads");
    }
  }, [screen, user, squads]);

  const handleVerified=(name,rating,verifyMethod="screenshot",locationId=null)=>{
    const loc=locationId||LOCATIONS[1].id;
    const newUser={name,rating,initials:name.split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase(),verifyMethod,locationId:loc};
    setUser(newUser);
    AUTH.save(newUser);
    if(locationId){
      setScreen("main");setActiveTab("chats");
    } else {
      setScreen("locationPick");
    }
  };

  // Log in an approved user from their application record
  const loginApprovedUser = (app) => {
    if (!app || !app.name || !app.email) { setScreen("login"); return; }
    const nameStr = app.name || "Player";
    const newUser = {
      name: nameStr,
      rating: parseFloat(app.rating) || 5.0,
      initials: nameStr.split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase(),
      verifyMethod: "screenshot",
      locationId: app.locationId || LOCATIONS[1].id,
      email: app.email.toLowerCase().trim(),
      approvedAt: app.approvedAt || app.reviewedAt || Date.now(),
    };
    // Save to BOTH cookie and localStorage — cookie persists across PWA installs
    AUTH.save(newUser);
    LS.set("pr_pending_app", { ...newUser, status: "approved" });
    // Update Firestore with last login time (best-effort)
    try {
      const docId = emailToId(app.email.toLowerCase().trim());
      window._db.collection("users").doc(docId).update({ lastLoginAt: Date.now() }).catch(()=>{});
    } catch(e) {}
    // Clean URL so refreshing doesn't re-trigger
    try { window.history.replaceState({}, "", window.location.pathname); } catch(e) {}
    setUser(newUser);
    setScreen("main");
    setActiveTab("chats");
  };

  const handleLocationSelected=(locationId)=>{
    setUser(u=>{
      const updated={...u,locationId};
      AUTH.save(updated);
      return updated;
    });
    setScreen("main");setActiveTab("chats");
  };

  // Notification count for matches tab
  const pendingForUser = user ? matches.filter(m=>m.createdBy===user.name&&(m.joinRequests||[]).some(r=>r.status==="pending")).length : 0;

  const handleJoin=(match)=>{setSelectedMatch(match);setScreen("joinConfirm");};

  const confirmJoin=()=>{
    const req={name:user.name,rating:user.rating,status:"pending",requestedAt:Date.now()};
    setMatches(p=>p.map(m=>m.id===selectedMatch.id?{...m,joinRequests:[...(m.joinRequests||[]),req]}:m));
    setSelectedMatch(p=>({...p,joinRequests:[...(p.joinRequests||[]),req]}));
    setScreen("matchDetail");
  };

  const handleApproveRequest=(match,req,approved)=>{
    let filledMatch = null;
    const updater=m=>{
      if(m.id!==match.id)return m;
      const ur=(m.joinRequests||[]).map(r=>r.name===req.name?{...r,status:approved?"approved":"declined"}:r);
      const up=approved?[...m.players,req.name]:m.players;
      const urat=approved?{...m.playerRatings,[req.name]:req.rating}:m.playerRatings;
      const updated={...m,joinRequests:ur,players:up,playerRatings:urat};
      // Detect if this approval just filled the last spot
      if(approved && up.length>=m.maxPlayers) filledMatch=updated;
      return updated;
    };
    setMatches(p=>p.map(updater));
    setSelectedMatch(p=>updater(p));
    // Auto-create private match chat when all spots filled
    if(filledMatch){
      const chatK=`match_chat_${filledMatch.id}`;
      const now=new Date();
      const timeStr=`${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`;
      setChats(p=>{
        if(p[chatK]&&p[chatK].length>0) return p; // already exists
        return {...p,[chatK]:[{id:Date.now(),sender:"PadelRank",text:`🎾 Match is full! This private chat is just for your ${filledMatch.players.length} players. Use it to coordinate court booking and logistics.`,mine:false,time:timeStr,system:true}]};
      });
    }
  };

  const handleLeave=(match)=>{
    const upd=m=>m.id!==match.id?m:{...m,players:m.players.filter(p=>p!==user.name),joinRequests:(m.joinRequests||[]).filter(r=>r.name!==user.name)};
    setMatches(p=>p.map(upd));setSelectedMatch(p=>upd(p));
  };

  const handleDelete=(match)=>{setMatches(p=>p.filter(m=>m.id!==match.id));setScreen("main");setActiveTab("matches");};

  const handleCreate=(match)=>{
    setMatches(p=>[match,...p]);setNewMatch(match);
    const now=new Date();
    const msg={id:Date.now(),type:"match_card",sender:match.createdBy,match,mine:false,time:`${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`};
    const tierIds=getMatchTierIds(match);
    setChats(p=>{const up={...p};tierIds.forEach(tid=>{const k=chatKey(tid,match.locationId);up[k]=[...(p[k]||[]),{...msg,id:Date.now()+Math.random()}];});return up;});
    setScreen("matchPosted");
  };

  const handleSendChat=(key,msg)=>{setChats(p=>({...p,[key]:[...(p[key]||[]),msg]}));};

  const openChat=(tier,location)=>{setActiveChatTier(tier);setActiveChatLoc(location);setScreen("chatRoom");};
  const openMatchFromChat=(match)=>{setSelectedMatch(match);setScreen("matchDetail");};
  const openMatchChat=(match)=>{
    // Auto-initialise chat if it doesn't exist yet (e.g. match was already full on load)
    const chatK=`match_chat_${match.id}`;
    setChats(p=>{
      if(p[chatK]) return p;
      const now=new Date();
      return {...p,[chatK]:[{id:Date.now(),sender:"PadelRank",text:`🎾 Match is full! This private chat is just for your ${match.players.length} players.`,mine:false,time:`${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`,system:true}]};
    });
    setActiveMatchChat(match);
    setScreen("matchChat");
  };

  const handleJoinSquad=(squad)=>{
    // Private squads: only allow joining if user has a stored invite for this squad
    if (squad.isPrivate !== false) {
      try {
        const invited = JSON.parse(localStorage.getItem("pr_squad_invites")||"[]");
        if (!invited.includes(squad.id)) return; // silently block — they shouldn't even see the button
      } catch(e) { return; }
    }
    setSquads(p=>p.map(s=>s.id===squad.id?{...s,members:[...s.members,user.name]}:s));
    setSelectedSquad(s=>s?.id===squad.id?{...s,members:[...s.members,user.name]}:s);
  };
  const handleLeaveSquad=(squad)=>{setSquads(p=>p.map(s=>s.id===squad.id?{...s,members:s.members.filter(m=>m!==user.name)}:s));setSelectedSquad(null);setScreen("main");setActiveTab("squads");};
  const handleDeleteSquad=(squad)=>{
    // Remove squad entirely + wipe its chat history
    setSquads(p=>p.filter(s=>s.id!==squad.id));
    setChats(p=>{ const next={...p}; delete next[`squad_${squad.id}`]; return next; });
    // Remove any stored invites for this squad
    try {
      const inv = JSON.parse(localStorage.getItem("pr_squad_invites")||"[]");
      localStorage.setItem("pr_squad_invites", JSON.stringify(inv.filter(id=>id!==squad.id)));
    } catch(e) {}
    setSelectedSquad(null);
    setScreen("main");
    setActiveTab("squads");
  };
  const handleCreateSquad=(sq)=>{setSquads(p=>[sq,...p]);setScreen("main");setActiveTab("squads");};

  return(
    <div style={{fontFamily:"'DM Sans',sans-serif",maxWidth:420,margin:"0 auto",background:T.card,borderRadius:24,overflow:"hidden",border:`0.5px solid ${T.border}`,minHeight:"100dvh"}}>

      {screen==="onboard"&&<OnboardingScreen onStart={()=>setScreen("verify")} onSignIn={()=>setScreen("login")} onSkip={()=>{
        setUser({name:"Demo Player",rating:5.8,initials:"DP",verifyMethod:"demo",locationId:"ftlauderdale"});
        AUTH.save({name:"Demo Player",rating:5.8,initials:"DP",verifyMethod:"demo",locationId:"ftlauderdale"});
        setScreen("main");setActiveTab("chats");
      }}/>}

      {/* Login screen — for returning approved users */}
      {(screen==="login"||screen==="deepLinkLogin"||screen==="loginApproved")&&<LoginScreen
        onBack={()=>setScreen("onboard")}
        onLogin={loginApprovedUser}
        onDemoMode={()=>{
          setUser({name:"Demo Player",rating:5.8,initials:"DP",verifyMethod:"demo",locationId:"ftlauderdale"});
          AUTH.save({name:"Demo Player",rating:5.8,initials:"DP",verifyMethod:"demo",locationId:"ftlauderdale"});
          setScreen("main");setActiveTab("chats");
        }}
      />}

      {/* Pending approval — show when they've applied but not yet been approved */}
      {screen==="pendingApproval"&&(()=>{
        const pending = LS.get("pr_pending_app", null);
        return pending ? <PendingApprovalScreen
          pendingApp={pending}
          onDemoMode={()=>{
            const n=pending.name||"Player";
            const r=pending.rating||5.8;
            const initials=n.split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase();
            setUser({name:n,rating:r,initials,verifyMethod:"demo",locationId:"ftlauderdale"});
            AUTH.save({name:n,rating:r,initials,verifyMethod:"demo",locationId:"ftlauderdale"});
            setScreen("main");setActiveTab("chats");
          }}
          onCheckStatus={(_status, app)=>{ if(_status==="approved") loginApprovedUser(app); }}
          onWithdraw={()=>{
            localStorage.removeItem("pr_pending_app");
            setScreen("verify");
          }}
        /> : null;
      })()}

      {screen==="verify"&&<VerifyScreen onVerified={handleVerified} onAdminLogin={()=>setScreen("adminLogin")}/>}

      {screen==="locationPick"&&<LocationPickerScreen onSelect={handleLocationSelected}/>}

      {screen==="adminLogin"&&<AdminLoginScreen onBack={()=>setScreen("verify")} onLogin={()=>{setAdminAuthed(true);setScreen("adminDashboard");}}/>}
      {screen==="adminDashboard"&&adminAuthed&&<AdminDashboardScreen onBack={()=>setScreen("verify")} onApprove={app=>console.log("Approved:",app.name)}/>}

      {screen==="main"&&user&&(
        <div style={{display:"flex",flexDirection:"column",height:"100dvh"}}>
          <div style={{flex:1,overflow:"auto"}}>
            {activeTab==="chats"&&<ChatsTab user={user} chats={chats} onOpenChat={openChat}/>}
            {activeTab==="matches"&&<MatchesTab user={user} matches={matches} onViewMatch={m=>{setSelectedMatch(m);setScreen("matchDetail");}} onCreateMatch={()=>{setPrefilledVenue(null);setScreen("createMatch");}} onJoin={handleJoin}/>}
            {activeTab==="courts"&&<CourtsTab user={user} onCreateMatchAtCourt={court=>{setPrefilledVenue(court);setScreen("createMatch");}}/>}
            {activeTab==="squads"&&<SquadsTab user={user} squads={squads} onOpenSquad={sq=>{setSelectedSquad(sq);setScreen("squadDetail");}} onCreateSquad={()=>setScreen("createSquad")}/>}
            {activeTab==="profile"&&<ProfileTab user={user} matches={matches} squads={squads} onReVerify={()=>setScreen("verify")} onChangeLocation={()=>setScreen("locationPick")} onSignOut={()=>{
              // Clear all persisted state
              AUTH.clear();
              ["pr_matches","pr_squads","pr_chats","pr_activeTab","pr_pending_app"].forEach(k=>localStorage.removeItem(k));
              setUser(null); setMatches(SEED_MATCHES); setSquads(SEED_SQUADS); setChats(buildSeedChats()); setScreen("onboard");
            }}/>}
          </div>
          <NavBar active={activeTab} onSwitch={setActiveTab} notifCount={pendingForUser}/>
        </div>
      )}

      {screen==="chatRoom"&&activeChatTier&&activeChatLoc&&user&&<ChatRoomScreen user={user} tier={activeChatTier} location={activeChatLoc} msgs={chats[chatKey(activeChatTier.id,activeChatLoc.id)]||[]} onSend={handleSendChat} onBack={()=>setScreen("main")} onViewMatch={openMatchFromChat} liveMatches={matches}/>}

      {screen==="matchDetail"&&selectedMatch&&user&&<MatchDetailScreen match={matches.find(m=>m.id===selectedMatch.id)||selectedMatch} user={user} onBack={()=>{setScreen("main");setActiveTab("matches");}} onJoin={handleJoin} onLeave={handleLeave} onDelete={handleDelete} onApproveRequest={handleApproveRequest} onOpenMatchChat={openMatchChat}/>}
      {screen==="matchChat"&&activeMatchChat&&user&&<MatchChatScreen match={matches.find(m=>m.id===activeMatchChat.id)||activeMatchChat} user={user} msgs={chats[`match_chat_${activeMatchChat.id}`]||[]} onSend={handleSendChat} onBack={()=>{setSelectedMatch(activeMatchChat);setScreen("matchDetail");}}/>}

      {screen==="createMatch"&&user&&<CreateMatchScreen user={user} onBack={()=>{setScreen("main");setActiveTab("matches");}} onCreate={handleCreate} prefilledVenue={prefilledVenue}/>}

      {screen==="matchPosted"&&newMatch&&<MatchPostedScreen match={newMatch} onDone={()=>{setSelectedMatch(newMatch);setScreen("matchDetail");}} onGoToChat={()=>{const firstTierId=getMatchTierIds(newMatch)[0];const tier=TIERS.find(t=>t.id===firstTierId);const loc=LOCATIONS.find(l=>l.id===newMatch.locationId)||LOCATIONS[1];if(tier&&loc){setActiveChatTier(tier);setActiveChatLoc(loc);setScreen("chatRoom");}}}/>}

      {screen==="joinConfirm"&&selectedMatch&&user&&<JoinConfirmScreen match={selectedMatch} onConfirm={confirmJoin} onBack={()=>setScreen("matchDetail")}/>}

      {screen==="squadDetail"&&selectedSquad&&user&&<SquadDetailScreen squad={squads.find(s=>s.id===selectedSquad.id)||selectedSquad} user={user} chats={chats} onSend={handleSendChat} onBack={()=>{setScreen("main");setActiveTab("squads");}} onJoin={handleJoinSquad} onLeave={handleLeaveSquad} onDelete={handleDeleteSquad}/>}

      {screen==="createSquad"&&user&&<CreateSquadScreen user={user} onBack={()=>{setScreen("main");setActiveTab("squads");}} onCreate={handleCreateSquad}/>}

    </div>
  );
}

    // ─── Mount ────────────────────────────────────────────────────────────────
    const container = document.getElementById('app-wrapper');
    const appRoot = ReactDOM.createRoot(container);
    appRoot.render(React.createElement(PadelRankApp));

    // EmailJS init
    (function initEmailJS() {
      if (!EMAIL_CONFIGURED) {
        console.warn("EmailJS: credentials not set — emails disabled. Update SERVICE_ID, TEMPLATE_ID, PUBLIC_KEY in the script.");
        return;
      }
      if (window.emailjs) {
        window.emailjs.init(EMAILJS_PUBLIC_KEY);
        console.log("✅ EmailJS initialised");
      } else {
        console.error("EmailJS SDK failed to load from CDN.");
      }
    })();

    // Set loading screen logo now that LOGO_URI is defined
    const _loadingLogo = document.getElementById('loading-logo-img');
    if (_loadingLogo) _loadingLogo.src = LOGO_URI;

    // Hide loading once React has painted
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        setTimeout(() => {
          const loader = document.getElementById('loading');
          if (loader) {
            loader.classList.add('out');
            setTimeout(() => loader.remove(), 450);
          }
        }, 300);
      });
    });

    // iOS "Add to Home Screen" nudge — only in Safari browser, not standalone
    (function() {
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const isStandalone = window.navigator.standalone === true;
      const dismissed = sessionStorage.getItem('pr_install_dismissed');
      if (isIOS && !isStandalone && !dismissed) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.id = 'ios-install';
          el.innerHTML = `
            <div style="display:flex;align-items:flex-start;gap:12px">
              <div style="flex-shrink:0"><img src="${LOGO_URI}" style="width:36px;height:36px;border-radius:8px;object-fit:cover;display:block;"/></div>
              <div style="flex:1">
                <div style="font-weight:700;color:#c8f135;font-size:14px;margin-bottom:3px">Install PadelRank</div>
                <div style="color:rgba(255,255,255,0.75);font-size:12px;line-height:1.5">
                  Tap the <strong style="color:white">Share</strong> button
                  <svg style="display:inline;margin:0 2px;vertical-align:middle" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                  then <strong style="color:white">"Add to Home Screen"</strong>
                </div>
              </div>
              <button onclick="this.closest('#ios-install').remove();sessionStorage.setItem('pr_install_dismissed','1')" style="background:none;border:none;color:rgba(255,255,255,0.4);font-size:22px;min-height:auto;padding:0;line-height:1">×</button>
            </div>`;
          document.body.appendChild(el);
        }, 4000);
      }
    })();

  </script>
</body>
</html>
